<svg width="100%" viewBox="0 0 880 1740" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <marker id="cf-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9c9a92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="cf-ar-o" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#F08531" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="cf-ar-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#e07a7a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title    { font-size: 18px; font-weight: 700; fill: #fff; }
      .subtitle { font-size: 12px; fill: #b4b2a9; }
      .secT     { font-size: 16px; font-weight: 700; fill: #fff; letter-spacing: 0.4px; }
      .secS     { font-size: 11px; fill: rgba(255,255,255,0.78); }
      .boxT     { font-size: 14px; font-weight: 600; fill: #fff; }
      .boxS     { font-size: 11px; fill: rgba(255,255,255,0.72); }
      .boxM     { font-size: 11px; fill: rgba(255,255,255,0.82); font-family: ui-monospace, SFMono-Regular, monospace; }
      .exitT    { font-size: 11px; font-weight: 600; fill: #fff; }
      .exitM    { font-size: 11px; fill: rgba(255,255,255,0.82); font-family: ui-monospace, SFMono-Regular, monospace; }
      .badge    { font-size: 10px; font-weight: 700; fill: #fff; letter-spacing: 0.04em; }
      .annot    { font-size: 11px; fill: #c2c0b6; }
      .annotM   { font-size: 11px; fill: #c2c0b6; font-family: ui-monospace, SFMono-Regular, monospace; }
      .legendT  { font-size: 10px; font-weight: 700; fill: #c2c0b6; letter-spacing: 0.08em; }
      .legendL  { font-size: 11px; fill: #b4b2a9; }
      .decisionK { font-size: 13px; font-weight: 700; fill: #F08531; font-family: ui-monospace, SFMono-Regular, monospace; }
      .decisionV { font-size: 12px; fill: #e7e4de; }
    </style>
  </defs>

  <!-- Dark canvas (so this drops cleanly onto a light page) -->
  <rect width="880" height="1740" fill="#0f0f0f"/>

  <!-- ── Title ───────────────────────────────────────────────────── -->
  <text x="440" y="34" text-anchor="middle" class="title">Control Flow · Act / Ask / Retry / Stop</text>
  <text x="440" y="54" text-anchor="middle" class="subtitle">Cheap deterministic checks first · expensive LLM last · most requests die before the model ever runs</text>

  <!-- ── Legend ──────────────────────────────────────────────────── -->
  <g transform="translate(620, 72)">
    <rect x="0" y="0" width="240" height="78" rx="6" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="12" y="18" class="legendT">LEGEND</text>
    <rect x="12" y="26" width="12" height="12" rx="3" fill="#1e4633" stroke="#86c9aa"/>
    <text x="30" y="36" class="legendL">Pure code / gate / DB</text>
    <rect x="12" y="44" width="12" height="12" rx="3" fill="#4738a0" stroke="#afa9ec"/>
    <text x="30" y="54" class="legendL">LLM / agent loop</text>
    <rect x="12" y="62" width="12" height="12" rx="3" fill="#5c4513" stroke="#e6a44e"/>
    <text x="30" y="72" class="legendL">Trigger / exit / response</text>
  </g>

  <!-- ── Trigger ─────────────────────────────────────────────────── -->
  <g transform="translate(280, 168)">
    <rect width="320" height="48" rx="24" fill="#5c4513" stroke="#e6a44e"/>
    <text x="160" y="22" text-anchor="middle" class="boxT">Patient message</text>
    <text x="160" y="38" text-anchor="middle" class="boxS">Awesome Healthcare · Customer Service agent</text>
  </g>
  <line x1="440" y1="216" x2="440" y2="244" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#cf-ar)"/>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- SECTION 1 · BEFORE THE LLM — 6 cheap gates                   -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <g transform="translate(40, 246)">
    <rect width="800" height="44" rx="8" fill="#FF7518"/>
    <text x="16" y="28" class="secT">BEFORE THE LLM — 6 cheap gates</text>
    <text x="780" y="28" text-anchor="end" class="secS">deterministic · ~ms each · most requests die here</text>
  </g>

  <!-- Spine arrow connecting the 6 gates (drawn first so it sits behind) -->
  <line x1="320" y1="310" x2="320" y2="710" stroke="#9c9a92" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Gate 1 — self-message? -->
  <g transform="translate(60, 306)">
    <rect width="520" height="46" rx="6" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="20" class="boxT">1.  self-message?</text>
    <text x="14" y="38" class="boxS">webhook came from our own bot — never reply to ourselves</text>
  </g>
  <line x1="580" y1="328" x2="612" y2="328" stroke="#F08531" stroke-width="1.5" marker-end="url(#cf-ar-o)"/>
  <g transform="translate(615, 306)">
    <rect width="200" height="46" rx="6" fill="#5c4513" stroke="#e6a44e" stroke-opacity="0.55"/>
    <text x="12" y="20" class="exitT">yes →</text>
    <text x="50" y="20" class="exitM">200 ignore</text>
    <text x="12" y="38" class="boxS">no LLM, no token spent</text>
  </g>

  <!-- Gate 2 — valid payload? -->
  <g transform="translate(60, 364)">
    <rect width="520" height="46" rx="6" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="20" class="boxT">2.  valid payload?</text>
    <text x="14" y="38" class="boxS">schema check — required fields, types, sizes</text>
  </g>
  <line x1="580" y1="386" x2="612" y2="386" stroke="#F08531" stroke-width="1.5" marker-end="url(#cf-ar-o)"/>
  <g transform="translate(615, 364)">
    <rect width="200" height="46" rx="6" fill="#5c4513" stroke="#e6a44e" stroke-opacity="0.55"/>
    <text x="12" y="20" class="exitT">no  →</text>
    <text x="50" y="20" class="exitM">400 invalid</text>
    <text x="12" y="38" class="boxS">reject at the door</text>
  </g>

  <!-- Gate 3 — dedup -->
  <g transform="translate(60, 422)">
    <rect width="520" height="46" rx="6" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="20" class="boxT">3.  seen before? (dedup)</text>
    <text x="14" y="38" class="boxS">message_id idempotency — retried webhooks must be safe</text>
  </g>
  <line x1="580" y1="444" x2="612" y2="444" stroke="#F08531" stroke-width="1.5" marker-end="url(#cf-ar-o)"/>
  <g transform="translate(615, 422)">
    <rect width="200" height="46" rx="6" fill="#5c4513" stroke="#e6a44e" stroke-opacity="0.55"/>
    <text x="12" y="20" class="exitT">yes →</text>
    <text x="50" y="20" class="exitM">200 duplicate</text>
    <text x="12" y="38" class="boxS">don't reply twice</text>
  </g>

  <!-- Gate 4 — already running? (lock) -->
  <g transform="translate(60, 480)">
    <rect width="520" height="46" rx="6" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="20" class="boxT">4.  already running? (lock)</text>
    <text x="14" y="38" class="boxS">per-conversation lock — no double-handling</text>
  </g>
  <line x1="580" y1="502" x2="612" y2="502" stroke="#F08531" stroke-width="1.5" marker-end="url(#cf-ar-o)"/>
  <g transform="translate(615, 480)">
    <rect width="200" height="46" rx="6" fill="#5c4513" stroke="#e6a44e" stroke-opacity="0.55"/>
    <text x="12" y="20" class="exitT">yes →</text>
    <text x="50" y="20" class="exitM">202 skip</text>
    <text x="12" y="38" class="boxS">first one wins</text>
  </g>

  <!-- Gate 5 — human handling -->
  <g transform="translate(60, 538)">
    <rect width="520" height="46" rx="6" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="20" class="boxT">5.  human handling it?</text>
    <text x="14" y="38" class="boxS">human handler took over — don't talk over them (24h auto-reset)</text>
  </g>
  <line x1="580" y1="560" x2="612" y2="560" stroke="#F08531" stroke-width="1.5" marker-end="url(#cf-ar-o)"/>
  <g transform="translate(615, 538)">
    <rect width="200" height="46" rx="6" fill="#5c4513" stroke="#e6a44e" stroke-opacity="0.55"/>
    <text x="12" y="20" class="exitT">yes →</text>
    <text x="50" y="20" class="exitM">skip AI</text>
    <text x="12" y="38" class="boxS">stay out of the way</text>
  </g>

  <!-- Gate 6 — credits left? -->
  <g transform="translate(60, 596)">
    <rect width="520" height="46" rx="6" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="20" class="boxT">6.  credits left?</text>
    <text x="14" y="38" class="boxS">credit_ledger check BEFORE the LLM — don't spend tokens to discover the tenant is broke</text>
  </g>
  <line x1="580" y1="618" x2="612" y2="618" stroke="#F08531" stroke-width="1.5" marker-end="url(#cf-ar-o)"/>
  <g transform="translate(615, 596)">
    <rect width="200" height="46" rx="6" fill="#5c4513" stroke="#e6a44e" stroke-opacity="0.55"/>
    <text x="12" y="20" class="exitT">no  →</text>
    <text x="50" y="20" class="exitM">canned reply</text>
    <text x="12" y="38" class="boxS">NO LLM call</text>
  </g>

  <!-- "all 6 passed" arrow -->
  <line x1="320" y1="642" x2="320" y2="690" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#cf-ar)"/>
  <text x="332" y="676" class="annot">all 6 passed</text>

  <!-- Fire-and-forget 202 pill -->
  <g transform="translate(280, 692)">
    <rect width="320" height="46" rx="23" fill="#5c4513" stroke="#e6a44e"/>
    <text x="160" y="20" text-anchor="middle" class="boxT" font-size="13">return 202 — fire &amp; forget</text>
    <text x="160" y="36" text-anchor="middle" class="boxM">webhook replies instantly · agent works in background</text>
  </g>
  <line x1="440" y1="738" x2="440" y2="766" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#cf-ar)"/>

  <!-- Load session + MCP health -->
  <g transform="translate(120, 768)">
    <rect width="640" height="62" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="20" class="boxT">load session (3-state) → MCP health check</text>
    <text x="14" y="38" class="boxS">if any MCP server is unreachable: degrade / error BEFORE the LLM ever spends a token</text>
    <text x="14" y="54" class="boxM">stale session → re-run fresh (no resume) · provider down → fallback model</text>
  </g>
  <line x1="440" y1="830" x2="440" y2="864" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#cf-ar)"/>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- SECTION 2 · INSIDE THE LLM LOOP                              -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <g transform="translate(40, 866)">
    <rect width="800" height="44" rx="8" fill="#FF7518"/>
    <text x="16" y="28" class="secT">INSIDE THE LLM LOOP — bounded</text>
    <text x="780" y="28" text-anchor="end" class="secS">≤ 20 turns · 2-min timeout · isolation hard-abort</text>
  </g>

  <!-- runAgent box -->
  <g transform="translate(60, 930)">
    <rect width="760" height="340" rx="8" fill="#4738a0" stroke="#afa9ec"/>
    <text x="20" y="24" class="boxT">runAgent loop · multi-turn LLM call → tool dispatch → repeat</text>
    <rect x="600" y="14" width="140" height="22" rx="11" fill="#2d2275"/>
    <text x="670" y="29" text-anchor="middle" class="badge">stop conditions guarded</text>

    <!-- Step 1: read skill -->
    <g transform="translate(20, 50)">
      <rect width="720" height="34" rx="4" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.4"/>
      <text x="14" y="21" class="boxM">→ read skill (search_knowledge) · build context · call the model</text>
    </g>

    <!-- Step 2: wants a tool? -->
    <g transform="translate(20, 92)">
      <rect width="500" height="40" rx="4" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.4"/>
      <text x="14" y="18" class="boxM">wants a tool?</text>
      <text x="14" y="34" class="boxS">no → exit loop, send reply</text>
    </g>
    <g transform="translate(530, 92)">
      <rect width="210" height="40" rx="4" fill="#1e4633" stroke="#86c9aa" stroke-opacity="0.55"/>
      <text x="12" y="18" class="exitT">no →</text>
      <text x="50" y="18" class="exitM">STOP (reply)</text>
      <text x="12" y="34" class="boxS">cleanest exit</text>
    </g>

    <!-- Step 3: refund check (LOCKED_REVIEW) -->
    <g transform="translate(20, 140)">
      <rect width="500" height="40" rx="4" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.4"/>
      <text x="14" y="18" class="boxM">refund / risky action? (LOCKED_REVIEW_ACTIONS)</text>
      <text x="14" y="34" class="boxS">tool name matches the locked list → guardrail trips</text>
    </g>
    <g transform="translate(530, 140)">
      <rect width="210" height="40" rx="4" fill="#5c4513" stroke="#e6a44e" stroke-opacity="0.7"/>
      <text x="12" y="18" class="exitT">yes →</text>
      <text x="58" y="18" class="exitM">BLOCK → human</text>
      <text x="12" y="34" class="boxS">queued for approval</text>
    </g>

    <!-- Step 4: execute tool -->
    <g transform="translate(20, 188)">
      <rect width="720" height="40" rx="4" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.4"/>
      <text x="14" y="18" class="boxM">execute tool · account_id OVERRIDDEN by server (LLM never picks the tenant)</text>
      <text x="14" y="34" class="boxS">guardrail: tenant isolation enforced in code, not prompt</text>
    </g>

    <!-- Step 5: isolation error? -->
    <g transform="translate(20, 236)">
      <rect width="500" height="40" rx="4" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.4"/>
      <text x="14" y="18" class="boxM">isolation error (-32001)?</text>
      <text x="14" y="34" class="boxS">tool tried to cross tenant boundary</text>
    </g>
    <g transform="translate(530, 236)">
      <rect width="210" height="40" rx="4" fill="#5c4513" stroke="#e6a44e" stroke-opacity="0.7"/>
      <text x="12" y="18" class="exitT">yes →</text>
      <text x="50" y="18" class="exitM">HARD ABORT</text>
      <text x="12" y="34" class="boxS">no recovery</text>
    </g>

    <!-- Loop arrow -->
    <text x="20" y="298" class="annot">no → loop again (≤ 20 turns total · 2-min wall clock)</text>
    <path d="M 20 304 Q 8 304 8 290 L 8 60 Q 8 50 20 50" fill="none" stroke="#afa9ec" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#cf-ar)" opacity="0.65"/>
    <text x="20" y="320" class="annotM">stop = no tool call · turn cap · timeout · isolation abort</text>
  </g>
  <line x1="440" y1="1270" x2="440" y2="1298" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#cf-ar)"/>

  <!-- ── STOP: strip handoff tags ───────────────────────────────── -->
  <g transform="translate(120, 1300)">
    <rect width="640" height="46" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="20" class="boxT">STOP — strip [HANDOFF:*] internal tags from the model output</text>
    <text x="14" y="38" class="boxS">internal markers used between agents must never leak to the patient</text>
  </g>
  <line x1="440" y1="1346" x2="440" y2="1374" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#cf-ar)"/>

  <!-- Send reply -->
  <g transform="translate(280, 1376)">
    <rect width="320" height="46" rx="23" fill="#5c4513" stroke="#e6a44e"/>
    <text x="160" y="20" text-anchor="middle" class="boxT" font-size="13">send reply → save session</text>
    <text x="160" y="36" text-anchor="middle" class="boxM">cost &amp; tool calls logged · session persisted</text>
  </g>

  <!-- ── The 4 decisions summary ─────────────────────────────────── -->
  <g transform="translate(40, 1452)">
    <rect width="800" height="184" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="16" y="26" class="boxT">The 4 decisions, concretely</text>

    <text x="16" y="62" class="decisionK">Act?</text>
    <text x="78" y="62" class="decisionV">only after 6 gates pass AND MCP is healthy</text>

    <text x="16" y="90" class="decisionK">Ask?</text>
    <text x="78" y="90" class="decisionV">gate 5 (human handler) + toolGate blocking refunds → human approval</text>

    <text x="16" y="118" class="decisionK">Retry?</text>
    <text x="92" y="118" class="decisionV">stale session → re-run without resume · provider fails → fallback model</text>

    <text x="16" y="146" class="decisionK">Stop?</text>
    <text x="78" y="146" class="decisionV">no tool calls · 20-turn cap · 2-min timeout · isolation abort</text>

    <text x="16" y="172" class="annot">Spread across all 4 plan types is the evidence — not "retries everywhere," which can double-charge.</text>
  </g>

  <!-- ── Bottom insight ──────────────────────────────────────────── -->
  <g transform="translate(40, 1656)">
    <rect width="800" height="70" rx="6" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="400" y="22" text-anchor="middle" class="boxT" font-size="13">Front-loaded: cheap rejection first, expensive LLM last</text>
    <text x="400" y="42" text-anchor="middle" class="boxS">6 deterministic guards reject most work before the LLM ever runs · the loop itself is bounded</text>
    <text x="400" y="58" text-anchor="middle" class="boxS">Determinism for typed contracts · LLM for ambiguous reasoning · best of both</text>
  </g>
</svg>
