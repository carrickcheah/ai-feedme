<svg width="100%" viewBox="0 0 880 1260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <marker id="g4-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9c9a92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="g4-ar-o" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#F08531" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="g4-ar-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#e67a7a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title    { font-size: 18px; font-weight: 700; fill: #fff; }
      .subtitle { font-size: 12px; fill: #b4b2a9; }
      .secT     { font-size: 16px; font-weight: 700; fill: #fff; letter-spacing: 0.4px; }
      .secS     { font-size: 11px; fill: rgba(255,255,255,0.78); }
      .boxT     { font-size: 14px; font-weight: 600; fill: #fff; }
      .boxS     { font-size: 11px; fill: rgba(255,255,255,0.72); }
      .boxM     { font-size: 11px; fill: rgba(255,255,255,0.85); font-family: ui-monospace, SFMono-Regular, monospace; }
      .badge    { font-size: 10px; font-weight: 700; fill: #fff; letter-spacing: 0.06em; }
      .annot    { font-size: 11px; fill: #c2c0b6; }
      .annotM   { font-size: 11px; fill: #c2c0b6; font-family: ui-monospace, SFMono-Regular, monospace; }
      .legendT  { font-size: 10px; font-weight: 700; fill: #c2c0b6; letter-spacing: 0.08em; }
      .legendL  { font-size: 11px; fill: #b4b2a9; }
      .versus   { font-size: 12px; font-weight: 700; fill: #c2c0b6; letter-spacing: 0.2em; }
      .decisionK { font-size: 13px; font-weight: 700; fill: #F08531; font-family: ui-monospace, SFMono-Regular, monospace; }
      .decisionV { font-size: 12px; fill: #e7e4de; }
      .verdictBad  { font-size: 13px; font-weight: 700; fill: #ffb0b0; font-family: ui-monospace, SFMono-Regular, monospace; }
      .verdictGood { font-size: 13px; font-weight: 700; fill: #b0e0c0; font-family: ui-monospace, SFMono-Regular, monospace; }
      .killer   { font-size: 16px; font-weight: 700; fill: #F08531; letter-spacing: 0.2px; }
    </style>
  </defs>

  <!-- Dark canvas -->
  <rect width="880" height="1260" fill="#0f0f0f"/>

  <!-- ── Title ───────────────────────────────────────────────────── -->
  <text x="440" y="34" text-anchor="middle" class="title">Guardrails — What the agent is forbidden to do</text>
  <text x="440" y="54" text-anchor="middle" class="subtitle">Enforced in code (100% deterministic), not prompt (~98%) · the AI can ask but cannot decide</text>

  <!-- ── Legend ──────────────────────────────────────────────────── -->
  <g transform="translate(620, 72)">
    <rect x="0" y="0" width="240" height="78" rx="6" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="12" y="18" class="legendT">LEGEND</text>
    <rect x="12" y="26" width="12" height="12" rx="3" fill="#1e4633" stroke="#86c9aa"/>
    <text x="30" y="36" class="legendL">Code / safe path</text>
    <rect x="12" y="44" width="12" height="12" rx="3" fill="#5c1313" stroke="#e67a7a"/>
    <text x="30" y="54" class="legendL">Unsafe / blocked</text>
    <rect x="12" y="62" width="12" height="12" rx="3" fill="#4738a0" stroke="#afa9ec"/>
    <text x="30" y="72" class="legendL">LLM action</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- SECTION 1 · THE PRINCIPLE                                    -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <g transform="translate(40, 160)">
    <rect width="800" height="44" rx="8" fill="#FF7518"/>
    <text x="16" y="28" class="secT">THE PRINCIPLE — code, not prompt</text>
    <text x="780" y="28" text-anchor="end" class="secS">deterministic beats probabilistic, every time</text>
  </g>

  <!-- PROMPT (left, red — UNSAFE) -->
  <g transform="translate(40, 220)">
    <rect width="380" height="220" rx="10" fill="#5c1313" stroke="#e67a7a"/>
    <text x="20" y="28" class="boxT">Guardrail in PROMPT</text>
    <rect x="294" y="14" width="72" height="22" rx="11" fill="#3a0a0a" stroke="#e67a7a" stroke-opacity="0.5"/>
    <text x="330" y="29" text-anchor="middle" class="badge">UNSAFE</text>

    <text x="20" y="58" class="boxS">A rule embedded in the system prompt:</text>
    <text x="20" y="82" class="boxM">"don't refund without approval"</text>

    <line x1="20" y1="100" x2="360" y2="100" stroke="#e67a7a" stroke-opacity="0.25" stroke-width="1"/>

    <text x="20" y="124" class="boxS">→ LLM reads it · LLM decides each request</text>
    <text x="20" y="144" class="boxS">→ probabilistic · ~98% compliance</text>
    <text x="20" y="164" class="boxS">→ prompt-injectable, jailbreakable</text>

    <text x="20" y="200" class="verdictBad">the 2% = leaked record / wrongful refund</text>
  </g>

  <!-- VS label between the two boxes -->
  <text x="440" y="334" text-anchor="middle" class="versus">VS</text>

  <!-- CODE (right, green — SAFE) -->
  <g transform="translate(460, 220)">
    <rect width="380" height="220" rx="10" fill="#1e4633" stroke="#86c9aa"/>
    <text x="20" y="28" class="boxT">Guardrail in CODE</text>
    <rect x="316" y="14" width="50" height="22" rx="11" fill="#0f3322" stroke="#86c9aa" stroke-opacity="0.5"/>
    <text x="341" y="29" text-anchor="middle" class="badge">SAFE</text>

    <text x="20" y="58" class="boxS">A hardcoded check in TypeScript:</text>
    <text x="20" y="82" class="boxM">if (LOCKED_REVIEW.has(tool)) BLOCK</text>

    <line x1="20" y1="100" x2="360" y2="100" stroke="#86c9aa" stroke-opacity="0.25" stroke-width="1"/>

    <text x="20" y="124" class="boxS">→ system enforces · runs before the LLM</text>
    <text x="20" y="144" class="boxS">→ deterministic · 100% compliance</text>
    <text x="20" y="164" class="boxS">→ not reachable from the model</text>

    <text x="20" y="200" class="verdictGood">blocks every request — no exceptions</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- SECTION 2 · EXAMPLE 1 — JAILBREAK ESCALATION                 -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <g transform="translate(40, 480)">
    <rect width="800" height="44" rx="8" fill="#FF7518"/>
    <text x="16" y="28" class="secT">EXAMPLE 1 — Jailbreak escalation (counter)</text>
    <text x="780" y="28" text-anchor="end" class="secS">tiered ban via deterministic counter on phone number</text>
  </g>

  <!-- Trigger -->
  <g transform="translate(220, 540)">
    <rect width="440" height="48" rx="24" fill="#5c4513" stroke="#e6a44e"/>
    <text x="220" y="22" text-anchor="middle" class="boxT">5 jailbreak attempts detected (in window)</text>
    <text x="220" y="38" text-anchor="middle" class="boxS">counter increments per phone number · code only · no LLM</text>
  </g>
  <line x1="440" y1="588" x2="440" y2="616" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#g4-ar)"/>

  <!-- Three tiers, horizontal -->
  <!-- Tier 1 — yellow-brown -->
  <g transform="translate(40, 620)">
    <rect width="246" height="108" rx="8" fill="#5c4513" stroke="#e6a44e"/>
    <rect x="14" y="14" width="60" height="20" rx="10" fill="#3d2c0c"/>
    <text x="44" y="28" text-anchor="middle" class="badge" fill="#e6a44e">TIER 1</text>
    <text x="14" y="58" class="boxT">24-hour phone ban</text>
    <text x="14" y="78" class="boxS">first escalation</text>
    <text x="14" y="96" class="boxM">ban_count = 1</text>
  </g>

  <!-- Arrow Tier 1 → 2 -->
  <line x1="291" y1="674" x2="319" y2="674" stroke="#F08531" stroke-width="2" marker-end="url(#g4-ar-o)"/>
  <text x="305" y="664" text-anchor="middle" class="annotM" font-size="10">repeats</text>

  <!-- Tier 2 — orange-brown -->
  <g transform="translate(324, 620)">
    <rect width="246" height="108" rx="8" fill="#5c2c13" stroke="#e6843e"/>
    <rect x="14" y="14" width="60" height="20" rx="10" fill="#3d1c0c"/>
    <text x="44" y="28" text-anchor="middle" class="badge" fill="#e6843e">TIER 2</text>
    <text x="14" y="58" class="boxT">1-week ban</text>
    <text x="14" y="78" class="boxS">repeat after the 24h cooldown</text>
    <text x="14" y="96" class="boxM">ban_count = 2</text>
  </g>

  <!-- Arrow Tier 2 → 3 -->
  <line x1="575" y1="674" x2="603" y2="674" stroke="#e67a7a" stroke-width="2" marker-end="url(#g4-ar-r)"/>
  <text x="589" y="664" text-anchor="middle" class="annotM" font-size="10" fill="#e67a7a">repeats</text>

  <!-- Tier 3 — red -->
  <g transform="translate(608, 620)">
    <rect width="232" height="108" rx="8" fill="#5c1313" stroke="#e67a7a"/>
    <rect x="14" y="14" width="60" height="20" rx="10" fill="#3a0a0a"/>
    <text x="44" y="28" text-anchor="middle" class="badge" fill="#e67a7a">TIER 3</text>
    <text x="14" y="58" class="boxT">PERMANENT BAN</text>
    <text x="14" y="78" class="boxS">third offense</text>
    <text x="14" y="96" class="boxM">ban_count ≥ 3</text>
  </g>

  <!-- Annotation under tiers -->
  <text x="440" y="754" text-anchor="middle" class="annot">The LLM never sees the counter · the counter never asks the LLM · pure code path.</text>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- SECTION 3 · EXAMPLE 2 — REFUND BLOCK                         -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <g transform="translate(40, 780)">
    <rect width="800" height="44" rx="8" fill="#FF7518"/>
    <text x="16" y="28" class="secT">EXAMPLE 2 — Refund block (action lock)</text>
    <text x="780" y="28" text-anchor="end" class="secS">LOCKED_REVIEW_ACTIONS + human approval queue</text>
  </g>

  <!-- Refund flow: 4 boxes left-to-right -->
  <!-- Step 1 — LLM tries -->
  <g transform="translate(40, 840)">
    <rect width="184" height="92" rx="8" fill="#4738a0" stroke="#afa9ec"/>
    <rect x="14" y="14" width="44" height="20" rx="10" fill="#2d2275"/>
    <text x="36" y="28" text-anchor="middle" class="badge">LLM</text>
    <text x="14" y="56" class="boxT">AI invokes</text>
    <text x="14" y="72" class="boxM">refund(amount)</text>
    <text x="14" y="86" class="boxS">tool call attempt</text>
  </g>
  <line x1="229" y1="886" x2="252" y2="886" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#g4-ar)"/>

  <!-- Step 2 — CODE checks -->
  <g transform="translate(256, 840)">
    <rect width="184" height="92" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <rect x="14" y="14" width="48" height="20" rx="10" fill="#0f3322"/>
    <text x="38" y="28" text-anchor="middle" class="badge">CODE</text>
    <text x="14" y="56" class="boxT">toolGate check</text>
    <text x="14" y="72" class="boxM">LOCKED_REVIEW</text>
    <text x="14" y="86" class="boxM">.has('refund')</text>
  </g>
  <line x1="445" y1="886" x2="468" y2="886" stroke="#e67a7a" stroke-width="1.8" marker-end="url(#g4-ar-r)"/>
  <text x="456" y="876" text-anchor="middle" class="annotM" font-size="10" fill="#e67a7a">BLOCK</text>

  <!-- Step 3 — Queued -->
  <g transform="translate(472, 840)">
    <rect width="184" height="92" rx="8" fill="#5c4513" stroke="#e6a44e"/>
    <rect x="14" y="14" width="60" height="20" rx="10" fill="#3d2c0c"/>
    <text x="44" y="28" text-anchor="middle" class="badge" fill="#e6a44e">QUEUE</text>
    <text x="14" y="56" class="boxT">Pending approval</text>
    <text x="14" y="72" class="boxM">action_approvals</text>
    <text x="14" y="86" class="boxS">action stays held</text>
  </g>
  <line x1="661" y1="886" x2="684" y2="886" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#g4-ar)"/>

  <!-- Step 4 — Human -->
  <g transform="translate(688, 840)">
    <rect width="152" height="92" rx="8" fill="#5c4513" stroke="#e6a44e"/>
    <rect x="14" y="14" width="60" height="20" rx="10" fill="#3d2c0c"/>
    <text x="44" y="28" text-anchor="middle" class="badge" fill="#e6a44e">HUMAN</text>
    <text x="14" y="56" class="boxT">approve or deny</text>
    <text x="14" y="72" class="boxS">only path forward</text>
    <text x="14" y="86" class="boxS">AI cannot self-approve</text>
  </g>

  <!-- Annotation below refund flow -->
  <text x="440" y="958" text-anchor="middle" class="annot">The AI can request a refund. It cannot execute one — the lock lives outside the model.</text>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- SYNTHESIS — the shape both examples share                    -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <g transform="translate(40, 984)">
    <rect width="800" height="140" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="16" y="26" class="boxT">The shape — same construction in both</text>

    <text x="16" y="58" class="decisionK">Counter</text>
    <text x="118" y="58" class="decisionV">jailbreak · ban_count = 1 → 2 → ∞  ·  24h → 1 week → permanent</text>

    <text x="16" y="86" class="decisionK">Lock</text>
    <text x="118" y="86" class="decisionV">refund · LOCKED_REVIEW.has(tool) → blocked + queued + human approves</text>

    <text x="16" y="118" class="annot">Both are pure code · run before the LLM · no prompt can disable them · no jailbreak can reach them.</text>
  </g>

  <!-- ── Killer line ─────────────────────────────────────────────── -->
  <g transform="translate(40, 1144)">
    <rect width="800" height="96" rx="10" fill="#1a1a1a" stroke="#F08531" stroke-opacity="0.65" stroke-width="1.5"/>
    <text x="440" y="40" text-anchor="middle" class="killer">"The AI can ask. It cannot decide.</text>
    <text x="440" y="68" text-anchor="middle" class="killer">Code holds the lock, not the prompt."</text>
  </g>
</svg>
