<svg width="100%" viewBox="0 0 880 1460" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <marker id="m5-ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9c9a92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="m5-ar-o" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#F08531" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="m5-ar-r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#e07a7a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title    { font-size: 18px; font-weight: 700; fill: #fff; }
      .subtitle { font-size: 12px; fill: #b4b2a9; }
      .secT     { font-size: 16px; font-weight: 700; fill: #fff; letter-spacing: 0.4px; }
      .secS     { font-size: 11px; fill: rgba(255,255,255,0.78); }
      .pillT    { font-size: 14px; font-weight: 600; fill: #fff; }
      .pillS    { font-size: 11px; fill: rgba(255,255,255,0.72); }
      .boxT     { font-size: 14px; font-weight: 600; fill: #fff; }
      .boxS     { font-size: 11px; fill: rgba(255,255,255,0.75); }
      .boxM     { font-size: 11px; fill: rgba(255,255,255,0.82); font-family: ui-monospace, SFMono-Regular, monospace; }
      .badge    { font-size: 10px; font-weight: 700; fill: #fff; letter-spacing: 0.04em; }
      .annot    { font-size: 11px; fill: #c2c0b6; }
      .funnelL  { font-size: 11px; fill: #b4b2a9; }
      .legendT  { font-size: 10px; font-weight: 700; fill: #c2c0b6; letter-spacing: 0.08em; }
      .legendL  { font-size: 11px; fill: #b4b2a9; }
      .accentK  { font-size: 11px; font-weight: 700; fill: #F08531; }
    </style>
  </defs>

  <!-- Dark canvas (matches 003.svg) -->
  <rect width="880" height="1460" fill="#0f0f0f"/>

  <!-- ── Title ─────────────────────────────────────────────────── -->
  <text x="440" y="34" text-anchor="middle" class="title">Memory Agents · answer()</text>
  <text x="440" y="54" text-anchor="middle" class="subtitle">Local embedder + reranker do the heavy lifting · the LLM only orchestrates</text>

  <!-- ── Legend ─────────────────────────────────────────────────── -->
  <g transform="translate(620, 76)">
    <rect x="0" y="0" width="240" height="64" rx="6" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="12" y="18" class="legendT">LEGEND</text>
    <rect x="12" y="26" width="12" height="12" rx="3" fill="#4738a0" stroke="#afa9ec"/>
    <text x="30" y="36" class="legendL">LLM call</text>
    <rect x="120" y="26" width="12" height="12" rx="3" fill="#1e4633" stroke="#86c9aa"/>
    <text x="138" y="36" class="legendL">Non-LLM (code)</text>
    <rect x="12" y="44" width="12" height="12" rx="3" fill="#5c4513" stroke="#e6a44e"/>
    <text x="30" y="54" class="legendL">Input / output</text>
  </g>

  <!-- ── Question pill ──────────────────────────────────────────── -->
  <g transform="translate(280, 84)">
    <rect width="280" height="48" rx="24" fill="#5c4513" stroke="#e6a44e"/>
    <text x="140" y="22" text-anchor="middle" class="pillT">Question</text>
    <text x="140" y="38" text-anchor="middle" class="pillS">"What did Maria do with her church friends?"</text>
  </g>
  <line x1="420" y1="132" x2="420" y2="160" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#m5-ar)"/>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- SECTION 1 · RETRIEVAL — assemble evidence                    -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <g transform="translate(40, 164)">
    <rect width="800" height="44" rx="8" fill="#FF7518"/>
    <text x="16" y="28" class="secT">RETRIEVAL — assemble the evidence</text>
    <text x="780" y="28" text-anchor="end" class="secS">decompose · funnel ~1000 → top 150 · LLM-pick 5–25</text>
  </g>

  <!-- Step 1 · Analyzer (LLM) -->
  <g transform="translate(180, 220)">
    <rect width="480" height="74" rx="8" fill="#4738a0" stroke="#afa9ec"/>
    <text x="20" y="24" class="boxT">Step 1 · Analyzer</text>
    <text x="20" y="44" class="boxS">Splits the question into 1–5 sub-questions. JSON output:</text>
    <text x="20" y="60" class="boxM">[{text, speakers, date_range}, …]</text>
    <rect x="380" y="14" width="80" height="22" rx="11" fill="#2d2275"/>
    <text x="420" y="29" text-anchor="middle" class="badge">LLM step</text>
  </g>
  <line x1="420" y1="294" x2="420" y2="324" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#m5-ar)"/>

  <!-- Step 2 · Recall (code only) -->
  <g transform="translate(60, 326)">
    <rect width="720" height="186" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="20" y="24" class="boxT">Step 2 · Recall (multi-stage funnel)</text>
    <rect x="620" y="14" width="80" height="22" rx="11" fill="#0f2a1f"/>
    <text x="660" y="29" text-anchor="middle" class="badge">code only</text>

    <g transform="translate(20, 44)">
      <rect width="160" height="44" rx="6" fill="#143324" stroke="#86c9aa" stroke-opacity="0.5"/>
      <text x="80" y="20" text-anchor="middle" class="boxT" font-size="12">2.1–2.2 Entity extract</text>
      <text x="80" y="36" text-anchor="middle" class="boxS" font-size="10">regex → DB ids</text>
    </g>
    <line x1="180" y1="66" x2="208" y2="66" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#m5-ar)"/>

    <g transform="translate(210, 44)">
      <rect width="160" height="44" rx="6" fill="#143324" stroke="#86c9aa" stroke-opacity="0.5"/>
      <text x="80" y="20" text-anchor="middle" class="boxT" font-size="12">2.3 Entity SQL filter</text>
      <text x="80" y="36" text-anchor="middle" class="boxS" font-size="10">narrow to ~hundreds</text>
    </g>
    <line x1="370" y1="66" x2="398" y2="66" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#m5-ar)"/>

    <g transform="translate(400, 44)">
      <rect width="170" height="44" rx="6" fill="#143324" stroke="#86c9aa" stroke-opacity="0.5"/>
      <text x="85" y="20" text-anchor="middle" class="boxT" font-size="12">2.4 Vec + BM25 (RRF)</text>
      <text x="85" y="36" text-anchor="middle" class="boxS" font-size="10">bge-m3 + FTS5 fusion</text>
    </g>
    <line x1="570" y1="66" x2="598" y2="66" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#m5-ar)"/>

    <g transform="translate(600, 44)">
      <rect width="100" height="44" rx="6" fill="#143324" stroke="#86c9aa" stroke-opacity="0.5"/>
      <text x="50" y="20" text-anchor="middle" class="boxT" font-size="12">2.6 Reranker</text>
      <text x="50" y="36" text-anchor="middle" class="boxS" font-size="10">bge-reranker-v2-m3</text>
    </g>

    <text x="20" y="112" class="annot">2.5 · Multi-recall: repeat 2.1–2.4 once per sub-Q (main + 4 sub = 5 calls), then dedup</text>

    <!-- Funnel numbers -->
    <g transform="translate(20, 124)">
      <text x="0" y="14" class="funnelL">~1000 raw</text>
      <line x1="80" y1="9" x2="118" y2="9" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#m5-ar)"/>
      <text x="124" y="14" class="funnelL">dedup → 700</text>
      <line x1="206" y1="9" x2="244" y2="9" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#m5-ar)"/>
      <text x="250" y="14" class="funnelL">cap → 300</text>
      <line x1="320" y1="9" x2="358" y2="9" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#m5-ar)"/>
      <text x="364" y="14" class="funnelL">reranker → top 150</text>
    </g>
    <text x="20" y="170" class="annot">Cost: embedder + SQL + reranker only. Total ≈ 500–800ms. <tspan font-weight="700" fill="#86c9aa">Zero LLM cost.</tspan></text>
  </g>
  <line x1="420" y1="512" x2="420" y2="542" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#m5-ar)"/>

  <!-- Step 3 · Selector ⇔ Adder loop -->
  <g transform="translate(60, 544)">
    <rect width="720" height="218" rx="8" fill="#4738a0" stroke="#afa9ec"/>
    <text x="20" y="24" class="boxT">Step 3 · Selector ⇔ Adder loop</text>
    <text x="20" y="42" class="boxS">Pick 5–25 memories from the 150-pool. Two rounds (early-exit Lever 1).</text>
    <rect x="600" y="14" width="100" height="22" rx="11" fill="#2d2275"/>
    <text x="650" y="29" text-anchor="middle" class="badge">LLM loop</text>

    <g transform="translate(20, 58)">
      <rect width="160" height="64" rx="6" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.6"/>
      <text x="80" y="22" text-anchor="middle" class="boxT" font-size="12">Selector (cutter)</text>
      <text x="80" y="38" text-anchor="middle" class="boxS" font-size="10">aggressive · picks ~5</text>
      <text x="80" y="54" text-anchor="middle" class="boxM" font-size="10">keep = [a,b,c,d,e]</text>
    </g>
    <line x1="180" y1="90" x2="218" y2="90" stroke="#afa9ec" stroke-width="1.4" marker-end="url(#m5-ar)"/>
    <g transform="translate(220, 58)">
      <rect width="180" height="64" rx="6" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.6"/>
      <text x="90" y="22" text-anchor="middle" class="boxT" font-size="12">Adder (rescue + probe)</text>
      <text x="90" y="38" text-anchor="middle" class="boxS" font-size="10">conservative · keeps default</text>
      <text x="90" y="54" text-anchor="middle" class="boxM" font-size="10">+ rescued = {a..f}</text>
    </g>
    <text x="120" y="138" text-anchor="middle" class="annot" fill="#afa9ec">↻ Round 1 → (optional) Round 2</text>
    <line x1="220" y1="135" x2="298" y2="135" stroke="#F08531" stroke-width="1.4" marker-end="url(#m5-ar-o)" stroke-dasharray="3,3"/>

    <g transform="translate(420, 58)">
      <rect width="280" height="64" rx="6" fill="#1e4633" stroke="#86c9aa" stroke-opacity="0.6"/>
      <text x="140" y="22" text-anchor="middle" class="boxT" font-size="12">Force-include + LIST widening</text>
      <text x="140" y="38" text-anchor="middle" class="boxS" font-size="10">pure code (Fix #25 / #28 / #31)</text>
      <text x="140" y="54" text-anchor="middle" class="boxS" font-size="10">duration · compare · list-Q top-up to 25</text>
    </g>

    <text x="20" y="155" class="annot">Adder can emit a probe query → fresh recall → new mems added to pool for Round 2</text>
    <text x="20" y="174" class="annot"><tspan class="accentK">Lever 1:</tspan> if keep_so_far unchanged after R1 → skip R2 (early-exit saves work)</text>
    <text x="20" y="198" class="annot" fill="#afa9ec" font-weight="700">Output: evidence = 5–25 memories</text>
  </g>
  <line x1="420" y1="762" x2="420" y2="792" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#m5-ar)"/>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- SECTION 2 · ANSWER — generate, vote, verify                  -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <g transform="translate(40, 794)">
    <rect width="800" height="44" rx="8" fill="#FF7518"/>
    <text x="16" y="28" class="secT">ANSWER — generate, vote, verify</text>
    <text x="780" y="28" text-anchor="end" class="secS">7 parallel candidates · code-only vote · 9-mode safety net</text>
  </g>

  <!-- Step 4 · Generator + Vote -->
  <g transform="translate(60, 858)">
    <rect width="720" height="206" rx="8" fill="#4738a0" stroke="#afa9ec"/>
    <text x="20" y="24" class="boxT">Step 4 · Generator (N=7 self-consistency) + Vote</text>
    <text x="20" y="42" class="boxS">Same evidence + question → parallel candidate drafts → cluster + pick.</text>
    <rect x="600" y="14" width="100" height="22" rx="11" fill="#2d2275"/>
    <text x="650" y="29" text-anchor="middle" class="badge">parallel</text>

    <g transform="translate(40, 64)">
      <rect width="86" height="44" rx="6" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.6"/>
      <text x="43" y="20" text-anchor="middle" class="boxT" font-size="11">cand 1</text>
      <text x="43" y="34" text-anchor="middle" class="boxS" font-size="10">temp=0.7</text>
    </g>
    <g transform="translate(132, 64)"><rect width="86" height="44" rx="6" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.6"/><text x="43" y="20" text-anchor="middle" class="boxT" font-size="11">cand 2</text><text x="43" y="34" text-anchor="middle" class="boxS" font-size="10">temp=0.7</text></g>
    <g transform="translate(224, 64)"><rect width="86" height="44" rx="6" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.6"/><text x="43" y="20" text-anchor="middle" class="boxT" font-size="11">cand 3</text><text x="43" y="34" text-anchor="middle" class="boxS" font-size="10">temp=0.7</text></g>
    <g transform="translate(316, 64)"><rect width="86" height="44" rx="6" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.6"/><text x="43" y="20" text-anchor="middle" class="boxT" font-size="11">cand 4</text><text x="43" y="34" text-anchor="middle" class="boxS" font-size="10">temp=0.7</text></g>
    <g transform="translate(408, 64)"><rect width="86" height="44" rx="6" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.6"/><text x="43" y="20" text-anchor="middle" class="boxT" font-size="11">cand 5</text><text x="43" y="34" text-anchor="middle" class="boxS" font-size="10">temp=0.7</text></g>
    <g transform="translate(500, 64)"><rect width="86" height="44" rx="6" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.6"/><text x="43" y="20" text-anchor="middle" class="boxT" font-size="11">cand 6</text><text x="43" y="34" text-anchor="middle" class="boxS" font-size="10">temp=0.7</text></g>
    <g transform="translate(592, 64)"><rect width="86" height="44" rx="6" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.6"/><text x="43" y="20" text-anchor="middle" class="boxT" font-size="11">cand 7</text><text x="43" y="34" text-anchor="middle" class="boxS" font-size="10">temp=0.7</text></g>

    <line x1="360" y1="116" x2="360" y2="138" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#m5-ar)"/>
    <g transform="translate(240, 140)">
      <rect width="240" height="44" rx="6" fill="#1e4633" stroke="#86c9aa" stroke-opacity="0.6"/>
      <text x="120" y="20" text-anchor="middle" class="boxT" font-size="12">VOTE (code, no LLM)</text>
      <text x="120" y="34" text-anchor="middle" class="boxS" font-size="10">cluster by Jaccard ≥ 0.5 · pick longest in biggest</text>
    </g>
  </g>
  <line x1="420" y1="1064" x2="420" y2="1094" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#m5-ar)"/>

  <!-- Step 5 · Verifier (safety net) -->
  <g transform="translate(60, 1096)">
    <rect width="720" height="180" rx="8" fill="#4738a0" stroke="#afa9ec"/>
    <text x="20" y="24" class="boxT">Step 5 · Verifier (safety net)</text>
    <text x="20" y="42" class="boxS">Checks the Vote winner against 9 failure modes (truncated · date math · format · etc).</text>
    <rect x="600" y="14" width="100" height="22" rx="11" fill="#2d2275"/>
    <text x="650" y="29" text-anchor="middle" class="badge">LLM check</text>

    <g transform="translate(40, 70)">
      <rect width="180" height="76" rx="6" fill="#1e4633" stroke="#86c9aa" stroke-opacity="0.6"/>
      <text x="90" y="22" text-anchor="middle" class="boxT" font-size="12">PASS</text>
      <text x="90" y="40" text-anchor="middle" class="boxS" font-size="10">return answer · done</text>
      <text x="90" y="60" text-anchor="middle" class="boxM" font-size="10">pass</text>
    </g>
    <g transform="translate(260, 70)">
      <rect width="200" height="76" rx="6" fill="#5c4513" stroke="#e6a44e" stroke-opacity="0.7"/>
      <text x="100" y="22" text-anchor="middle" class="boxT" font-size="12">REGENERATE</text>
      <text x="100" y="40" text-anchor="middle" class="boxS" font-size="10">Generator runs once more</text>
      <text x="100" y="56" text-anchor="middle" class="boxS" font-size="10">with fix_hint from Verifier</text>
      <text x="100" y="70" text-anchor="middle" class="boxM" font-size="10">retry</text>
    </g>
    <g transform="translate(500, 70)">
      <rect width="180" height="76" rx="6" fill="#1e4633" stroke="#86c9aa" stroke-opacity="0.6"/>
      <text x="90" y="22" text-anchor="middle" class="boxT" font-size="12">SKIPPED · Lever 2</text>
      <text x="90" y="40" text-anchor="middle" class="boxS" font-size="10">7/7 unanimous → trust vote</text>
      <text x="90" y="56" text-anchor="middle" class="boxS" font-size="10">save ~6s + ~5K tokens</text>
      <text x="90" y="70" text-anchor="middle" class="boxM" font-size="10">skip</text>
    </g>
  </g>
  <line x1="420" y1="1276" x2="420" y2="1306" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#m5-ar)"/>

  <!-- Answer pill -->
  <g transform="translate(280, 1308)">
    <rect width="280" height="48" rx="24" fill="#5c4513" stroke="#e6a44e"/>
    <text x="140" y="22" text-anchor="middle" class="pillT">Answer + supporting memories</text>
    <text x="140" y="38" text-anchor="middle" class="pillS">+ memories[5–25] returned via answer.memories</text>
  </g>

  <!-- Bottom insight (matches 003's closing card) -->
  <g transform="translate(40, 1376)">
    <rect width="800" height="70" rx="6" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="400" y="22" text-anchor="middle" class="boxT" font-size="13">Pipeline: Analyzer → Recall → Selector ⇔ Adder → Generator + Vote → Verifier</text>
    <text x="400" y="42" text-anchor="middle" class="boxS">Generator runs in parallel · lands in roughly one call's wall-time · Recall + Vote are pure code</text>
    <text x="400" y="58" text-anchor="middle" class="boxS">Two early-exit levers (R2 skip · 7/7 verifier skip) trade safety net for latency on confident answers</text>
  </g>
</svg>
