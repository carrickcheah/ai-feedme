<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Build Agent by Harness Engineering · FeedMe</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text x=%221%22 y=%2213%22 font-size=%2213%22>👻</text></svg>" />
<style>
  :root {
    --bg: #f4f2ed;
    --surface: #ffffff;
    --line: #e7e4de;
    --ink: #1f2329;
    --muted: #707783;
    --a: #f26a1b;      /* FeedMe orange — Tier A (CORE) */
    --b: #1fa45c;      /* FeedMe green  — Tier B (OPS)  */
    --glow-a: rgba(242,106,27,0.26);
    --glow-b: rgba(31,164,92,0.22);
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background-color: #fbfbfa;
    background-image: radial-gradient(circle, rgba(31,35,41,0.05) 1.1px, transparent 1.4px);
    background-size: 26px 26px;
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    padding: 24px; overflow-x: hidden;
  }
  /* slow-drifting orange aurora behind everything */
  .aurora {
    position: fixed; inset: -25%; z-index: 0; pointer-events: none;
    background:
      radial-gradient(520px 400px at 24% 18%, rgba(242,106,27,0.22), transparent 62%),
      radial-gradient(440px 340px at 80% 32%, rgba(242,106,27,0.15), transparent 62%),
      radial-gradient(480px 380px at 62% 82%, rgba(255,168,84,0.14), transparent 62%);
    filter: blur(24px);
    animation: aurora 28s ease-in-out infinite alternate;
  }
  @keyframes aurora {
    0%   { transform: translate(0%, 0%) scale(1); }
    50%  { transform: translate(-3%, 2.5%) scale(1.08); }
    100% { transform: translate(3%, -2%) scale(1.05); }
  }

  /* margin:auto centers when content fits, but collapses to top-aligned
     (scrollable from the top) when content is taller than the viewport */
  .stage { width: min(1416px, 100%); margin: auto; position: relative; z-index: 1; }

  /* FeedMe brand header */
  .brand { display: flex; align-items: center; gap: 12px; padding: 0 0 26px; }
  .logo {
    width: 38px; height: 38px; border-radius: 11px; background: #1b1b1d; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 19px; box-shadow: 0 4px 14px rgba(0,0,0,0.18);
  }
  .brand-name { font-size: 17px; font-weight: 800; letter-spacing: -0.2px; }
  .brand-tag { font-size: 12px; color: var(--muted); margin-top: 1px; }

  /* title */
  .title-wrap { text-align: center; margin-bottom: 6px; }
  h1 {
    font-size: clamp(23px, 4.4vw, 44px); font-weight: 800;
    letter-spacing: -0.6px; line-height: 1.12; color: var(--ink);
    text-shadow: 0 6px 34px var(--glow-a);
  }
  .cycle-wrap { display: inline-block; text-align: center; vertical-align: baseline; }
  .cycle {
    display: inline-block; color: var(--a);
    transition: transform .4s cubic-bezier(.22,.7,.22,1), opacity .4s ease, filter .4s ease;
  }
  .cycle.out  { transform: translateY(-0.42em); opacity: 0; filter: blur(6px); }
  .cycle.down { transform: translateY(0.42em);  opacity: 0; filter: blur(6px); }
  .subtitle {
    text-align: center; color: var(--muted); font-size: clamp(13px, 1.6vw, 15px);
    margin: 14px 0 6px; opacity: 0; animation: fadeIn .8s ease forwards .2s;
  }
  .hint {
    text-align: center; color: var(--a); font-size: 12.5px; font-weight: 600; letter-spacing: .02em;
    margin-bottom: 30px; opacity: 0; animation: fadeIn .8s ease forwards .6s;
  }

  /* tier label */
  .tier {
    display: flex; align-items: center; gap: 12px;
    font-size: 11.5px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 700;
    color: var(--muted); margin: 26px 4px 14px; opacity: 0; transform: translateY(8px);
  }
  .tier .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .tier .rule { flex: 1; height: 1px; background: var(--line); }
  .tier.show { animation: rise .6s ease forwards; }

  /* grid — 4 cols × 3 rows (10 cards + 2 placeholders), cell sized to fit one screen */
  .grid {
    display: grid; --cell: min(21vw, 24vh);
    grid-template-columns: repeat(4, var(--cell)); grid-auto-rows: var(--cell);
    gap: 16px; justify-content: center; margin-top: 18px;
  }
  /* responsive breakpoints are defined at the END of this stylesheet (after the
     base .card/.name/.num rules) so they override correctly */

  .card {
    position: relative; cursor: pointer;
    background: #0b0b0e; border: 1px solid rgba(255,255,255,0.09); border-radius: 16px;
    padding: 16px 14px;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; gap: 8px;
    opacity: 0; transform: translateY(22px) scale(.98);
    transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
    overflow: hidden; box-shadow: 0 4px 16px -8px rgba(31,35,41,0.18);
  }
  .card.in { animation: pop .55s cubic-bezier(.2,.8,.2,1) forwards; }
  .card::before {
    content: ""; position: absolute; inset: 0 0 auto 0; height: 4px;
    background: var(--accent);
  }
  .card:hover {
    transform: translateY(-6px) scale(1.02); border-color: var(--accent);
    box-shadow: 0 20px 40px -16px var(--cardglow);
  }
  .ascii {
    position: absolute; inset: 0; margin: 0; z-index: 0; pointer-events: none;
    font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 10px; line-height: 1.05;
    letter-spacing: 1px; color: #ffffff; opacity: var(--ascii-op, 0.18); white-space: pre; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    -webkit-mask-image: radial-gradient(circle at 50% 48%, #000 46%, transparent 94%);
    mask-image: radial-gradient(circle at 50% 48%, #000 46%, transparent 94%);
    transition: opacity .25s ease;
  }
  .card:hover .ascii { opacity: calc(var(--ascii-op, 0.18) + 0.12); }
  .num {
    position: relative; z-index: 1;
    font-size: 20px; color: #ffffff; font-weight: 800; letter-spacing: .3px;
    display: flex; align-items: center; gap: 8px;
  }
  .num .badge {
    font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 999px;
    color: #fff; background: var(--accent); letter-spacing: .1em;
  }
  .name { position: relative; z-index: 1; font-size: 24.5px; font-weight: 800; color: #FF7E00; line-height: 1.2; letter-spacing: -0.2px; }
  .q { font-size: 12.5px; color: var(--muted); line-height: 1.45; margin-top: auto; }
  .more { font-size: 10.5px; font-weight: 700; color: var(--accent); opacity: .85; letter-spacing: .06em; }
  .card.placeholder { background: transparent; border: 1.5px dashed rgba(31,35,41,0.18); box-shadow: none; cursor: default; }
  .card.placeholder::before { display: none; }
  .card.placeholder:hover { transform: none; border-color: rgba(31,35,41,0.18); box-shadow: none; }
  .ph-plus { color: rgba(31,35,41,0.16); font-size: 34px; font-weight: 300; line-height: 1; }
  .card.extra .name { color: #fff; }

  /* controls */
  .controls { display:flex; justify-content:center; gap: 12px; margin-top: 30px; }
  button {
    font-family: var(--sans); font-size: 13px; font-weight: 700; cursor: pointer;
    border-radius: 999px; padding: 10px 22px; transition: all .2s ease;
    border: 1px solid var(--line); background: var(--surface); color: var(--ink);
  }
  button:hover { box-shadow: 0 8px 20px -10px rgba(31,35,41,0.3); transform: translateY(-1px); }
  .btn-primary { background: var(--a); color: #fff; border-color: var(--a); }
  .btn-primary:hover { box-shadow: 0 10px 24px -8px var(--glow-a); }

  /* modal */
  .backdrop {
    position: fixed; inset: 0; background: rgba(31,35,41,0.34);
    backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center;
    padding: 24px; z-index: 50; opacity: 0;
  }
  .backdrop.open { display: flex; animation: fadeIn .2s ease forwards; }
  .modal {
    position: relative; width: min(640px, 100%); max-height: 86vh; overflow-y: auto;
    background: var(--surface); border: 1px solid var(--line); border-radius: 18px;
    padding: 28px 30px 22px; box-shadow: 0 40px 90px -24px rgba(31,35,41,0.4);
    transform: scale(.94); animation: pop .35s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .modal::before {
    content: ""; position: absolute; inset: 0 0 auto 0; height: 5px;
    background: var(--accent); border-radius: 18px 18px 0 0;
  }
  .m-close {
    position: absolute; top: 16px; right: 18px; width: 30px; height: 30px; padding: 0;
    border-radius: 999px; font-size: 14px; line-height: 1; color: var(--muted);
  }
  .m-head { display: flex; align-items: center; gap: 10px; margin: 4px 0 2px; }
  .m-num { color: var(--accent); font-weight: 800; font-size: 14px; }
  .m-badge {
    font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 999px;
    color: #fff; background: var(--accent); letter-spacing: .1em;
  }
  .m-name { font-size: 23px; font-weight: 800; margin: 2px 0; letter-spacing: -0.4px; }
  .m-q { color: var(--accent); font-size: 13.5px; font-weight: 600; margin-bottom: 20px; }
  .m-section { margin-bottom: 18px; }
  .m-label {
    font-size: 10px; letter-spacing: .16em; text-transform: uppercase; font-weight: 700;
    color: var(--muted); margin-bottom: 7px;
  }
  .m-simple { font-size: 14.5px; line-height: 1.55; color: var(--ink); }
  .m-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .m-list li {
    font-size: 13px; line-height: 1.5; color: #3c4350; padding-left: 18px; position: relative;
  }
  .m-list li::before { content: "▸"; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
  .m-killer {
    font-size: 13.5px; line-height: 1.55; color: var(--ink); font-weight: 600;
    border-left: 3px solid var(--accent); padding: 10px 0 10px 14px;
    background: var(--killtint); border-radius: 0 10px 10px 0;
  }
  .m-foot {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--line);
  }
  .m-foot .count { color: var(--muted); font-size: 12px; font-weight: 600; }
  .m-nav { display: flex; gap: 8px; }

  /* full-page detail (drill-down navigation) */
  .page {
    position: fixed; inset: 0; z-index: 60; display: none;
    background-color: #fbfbfa;
    background-image:
      radial-gradient(900px 420px at 50% -120px, rgba(242,106,27,0.18), transparent 65%),
      radial-gradient(circle, rgba(31,35,41,0.05) 1.1px, transparent 1.4px);
    background-size: 100% 100%, 26px 26px;
    background-repeat: no-repeat, repeat;
    color: var(--ink); overflow-y: auto; padding: 52px 24px;
    animation: fadeIn .25s ease;
  }
  .page.open { display: block; }
  .d-inner { width: min(720px, 100%); margin: 0 auto; }
  .d-back {
    background: none; border: none; color: var(--a); font-weight: 700; font-size: 14px;
    cursor: pointer; padding: 6px 0; margin-bottom: 24px;
  }
  .d-back:hover { box-shadow: none; transform: none; opacity: .8; }
  .d-head { display: flex; align-items: center; gap: 8px; color: var(--muted);
    font-size: 12px; letter-spacing: .12em; text-transform: uppercase; font-weight: 700; }
  .d-num { color: var(--a); }
  .d-name { font-size: clamp(34px, 6vw, 56px); font-weight: 800; letter-spacing: -1px; margin: 10px 0 6px; }
  .d-q { color: var(--a); font-size: 16px; font-weight: 600; margin-bottom: 32px; }
  .d-image {
    display: block; width: 100%; height: auto;
    border: 1px solid var(--line); border-radius: 12px;
    box-shadow: 0 12px 32px -16px rgba(31,35,41,0.18);
    margin: 0 0 32px;
  }
  .d-diagram {
    display: block; width: 100%;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 13px; line-height: 1.55; color: var(--ink);
    background: #fff;
    border: 1px solid var(--line); border-left: 3px solid var(--a);
    border-radius: 0 12px 12px 0;
    padding: 18px 20px;
    margin: 0 0 32px;
    overflow-x: auto;
    white-space: pre;
    box-shadow: 0 12px 32px -16px rgba(31,35,41,0.18);
  }
  .d-table {
    width: 100%; border-collapse: collapse;
    background: #fff;
    border: 1px solid var(--line); border-left: 3px solid var(--a);
    border-radius: 0 12px 12px 0; overflow: hidden;
    margin: 0 0 32px;
    box-shadow: 0 12px 32px -16px rgba(31,35,41,0.18);
    font-size: 14px;
  }
  .d-table thead th {
    text-align: left; padding: 12px 16px;
    background: rgba(31,35,41,0.04);
    color: var(--muted);
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase; font-weight: 700;
    border-bottom: 1px solid var(--line);
  }
  .d-table tbody td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    color: var(--ink); line-height: 1.45;
    vertical-align: top;
  }
  .d-table tbody tr:last-child td { border-bottom: none; }
  .d-table tbody td:first-child { font-weight: 600; }
  .d-table tbody td:last-child { white-space: nowrap; color: var(--muted); }
  .d-section { margin-bottom: 26px; }
  .d-label { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); font-weight: 700; margin-bottom: 10px; }
  .d-simple { font-size: 17px; line-height: 1.6; color: var(--ink); }
  .d-qa { list-style: none; display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
  .d-qa li {
    display: grid; grid-template-columns: minmax(0, 1fr) auto minmax(0, 0.7fr);
    align-items: baseline; gap: 14px;
    padding: 12px 16px;
    background: #fff;
    border: 1px solid var(--line); border-left: 3px solid var(--a); border-radius: 0 10px 10px 0;
    font-size: 15px; line-height: 1.5;
  }
  .d-qa .qa-q { color: var(--ink); font-weight: 600; }
  .d-qa .qa-sep { color: var(--a); font-weight: 700; }
  .d-qa .qa-a { color: var(--muted); font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 13px; }
  .d-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .d-list li { font-size: 15px; line-height: 1.55; color: #3c4350; padding-left: 22px; position: relative; }
  .d-list li::before { content: "▸"; position: absolute; left: 0; color: var(--a); font-weight: 700; }
  .d-killer { font-size: 17px; line-height: 1.55; color: var(--ink); font-weight: 600;
    border-left: 3px solid var(--a); padding: 12px 0 12px 18px;
    background: linear-gradient(90deg, rgba(242,106,27,0.12), transparent); border-radius: 0 10px 10px 0; }
  .d-foot { display: flex; align-items: center; justify-content: space-between;
    margin-top: 36px; padding-top: 20px; border-top: 1px solid var(--line); }
  .d-count { color: var(--muted); font-size: 13px; font-weight: 600; }
  .d-nav { display: flex; gap: 10px; }
  .d-nav button { background: #fff; border: 1px solid var(--line); color: var(--ink); }
  .d-nav button:hover { border-color: var(--a); box-shadow: 0 8px 20px -10px var(--glow-a); }

  @keyframes pop { 0% { opacity:0; transform: translateY(22px) scale(.98); } 100% { opacity:1; transform: translateY(0) scale(1); } }
  @keyframes rise { to { opacity:1; transform: translateY(0); } }
  @keyframes fadeIn { to { opacity:1; } }

  /* responsive — placed LAST so these win over the base rules above */
  @media (max-width: 920px) { .grid { --cell: min(42vw, 24vh); grid-template-columns: repeat(2, var(--cell)); } }
  @media (max-width: 540px) {
    /* phone: 3 cols × 4 rows, fits one screen (no scroll) */
    .grid { --cell: min(27vw, 20vh); grid-template-columns: repeat(3, var(--cell)); gap: 10px; margin-top: 14px; }
    .card { padding: 8px 6px; gap: 5px; border-radius: 12px; }
    .name { font-size: 16px; }
    .num { font-size: 12px; }
  }
</style>
</head>
<body>
  <div class="aurora"></div>
  <div class="stage">
    <div class="title-wrap">
      <h1>Build Agent by <span class="cycle-wrap"><span id="cycle" class="cycle">Harness</span></span> Engineering</h1>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <div class="page" id="detailView"></div>

<script>
  const CARDS = [
    { n: 1, tier: "A", name: "Tools", q: "What can the agent do?",
      image: "images/001.png",
      imageAlt: "Admin Core Agent — Skills tab showing tools as skill definitions",
      simple: "Tools are the model's hands (act) and eyes (read). A brain with no tools can only talk — and will hallucinate, because it can't reach real data.",
      how: [
        "MCP tools (strict schema) for the customer-facing agent; Code Mode (flexible) for the admin agent — trust-tiered.",
        "Code Mode collapsed 23 MCP tools into 2 (api_search + api_execute) → ~60% fewer input tokens.",
        "A skill REFERENCES a tool — the skill is the recipe, the tool is the callable."
      ],
      killer: "Tools give the model hands. Harness engineering decides what those hands are allowed to touch." },

    { n: 2, tier: "A", name: "Context", q: "What does the agent see this step?",
      image: "images/002.png",
      imageAlt: "Awesome Healthcare tenant — 2 built-in agents + 7 custom agents, each a distinct context bundle",
      diagram:
        "Agent = Model + Context        |   multiple agents = multiple context bundles\n" +
        "                                   (prompt + tools + mcp + db-scope + skills)",
      simple: "What distinguishes one agent from another is ~90% context: prompt, tools, MCP, db-scope, skills. The ONE thing that is NOT context is the model itself — the brain choice (deepseek vs anthropic, set in providers.yaml).",
      how: [
        "Same context can run on either model — the context didn't change, the brain did.",
        "Multiple agents = multiple context bundles (prompt + tools + MCP + db-scope + skills).",
        "Demo tenant: Awesome Healthcare (synthetic data) — context is scoped per-tenant."
      ],
      killer: "Agent = Model + Context. Multiple agents = multiple context bundles." },

    { n: 3, tier: "A", name: "Memory", q: "What carries between steps and sessions?",
      image: "images/005.svg",
      imageAlt: "Memory agent pipeline — Analyzer (LLM) → Recall funnel (code-only: entity → SQL → vec+BM25/RRF → reranker, ~1000 → top 150) → Selector⇔Adder LLM loop → Generator ×7 + clustering vote → Verifier (9 failure modes) → Answer",
      simple: "Without memory the agent is a goldfish. Memory lets it remember the patient across a conversation and across days. Two parts: WHERE (tiered storage) and HOW (a memory agent).",
      how: [
        "Tiered: SQLite+vec (hot, local), Postgres (relational truth — joins, transactions), Qdrant (semantic scale).",
        "A dedicated memory agent retrieves it: Analyzer → Recall → Selector ⇔ Adder → Generator ×7 + Vote → Verifier.",
        "Recall and voting cost ZERO LLM tokens; a verifier guards the final answer against 9 failure modes."
      ],
      killer: "Heavy lifting is done by the local embedder + reranker — the LLM only orchestrates." },

    { n: 4, tier: "A", name: "Guardrails", q: "What is the agent forbidden to do?",
      image: "images/004.svg",
      imageAlt: "Guardrails diagram — PROMPT vs CODE principle, then two examples (jailbreak escalation counter, refund block + human approval), ending in the killer line",
      simple: "Guardrails are the actions the AI is NOT allowed to take, even if it tries. Enforced in code, not prompt — because code blocks 100% of the time.",
      how: [
        "Jailbreak: 5 attempts → 24h phone ban. Repeats escalate to 1 week, then permanent.",
        "Refund: blocked in code. The AI can request approval; it cannot execute alone.",
        "Same shape both times — a counter or a lock in code that the LLM cannot bypass via prompt."
      ],
      killer: "The AI can ask. It cannot decide. Code holds the lock, not the prompt." },

    { n: 5, tier: "A", name: "Control Flow", q: "Should the agent act, ask, retry, or stop?",
      image: "images/003.svg",
      imageAlt: "Control flow diagram — 6 cheap gates before the LLM, bounded loop inside, with the four decisions (Act / Ask / Retry / Stop) summarized at the bottom",
      simple: "The decision logic around the agent loop — when to invoke the model, when to call a tool, when to retry, when to stop. Front-loaded: cheap deterministic checks first, the expensive non-deterministic LLM last.",
      how: [
        "6 gates run BEFORE the LLM (self-msg, validation, dedup, lock, human-check, credit-gate) → reject most work cheaply.",
        "The agent loop is bounded: 20-turn cap + 2-min timeout + isolation hard-abort.",
        "Fire-and-forget 202 — the webhook returns instantly, the agent works in the background."
      ],
      killer: "Most of my control flow runs before the model: cheap deterministic checks first, the expensive model last." },

    { n: 6, tier: "B", name: "Reliability", q: "What happens when a step fails?",
      table: {
        headers: ["#", "Failure", "Plan", "Type"],
        rows: [
          ["1", "Model provider fails", "fallback model (per-turn)", "🔄 Backup"],
          ["2", "Model hangs", "2-min timeout → abort", "⏰ Timeout"],
          ["3", "Loop runs away", "20-turn cap → stop", "⏰ Timeout"],
          ["4", "MCP server offline", "health pre-check", "🛟 Degrade"],
          ["5", "Corrupted session", "sanitizer repairs", "↻ Retry"],
          ["6", "Stale session", "retry fresh (no resume)", "↻ Retry"],
          ["7", "Overload", "concurrency cap → 503", "🛟 Degrade"]
        ]
      },
      simple: "Things WILL break — the model API times out, an MCP server is down, a session gets corrupted. Reliability is the set of planned responses so the patient still gets served.",
      how: [
        "7 failure points, each with a matched plan — backup, retry, timeout, or graceful degrade.",
        "Fallback is per-turn, not per-request — a backup model retries just the failed turn.",
        "The skill is matching the plan to the failure — retrying everywhere is dangerous (retrying a refund could double-charge)."
      ],
      killer: "I designed for failure, not just the happy path." },

    { n: 7, tier: "B", name: "Observability", q: "How do I see what the agent did?",
      simple: "The 3 questions it answers:",
      simpleQa: [
        ["Is it healthy?", "metrics"],
        ["What did it do on this request?", "traces"],
        ["Should I be worried right now?", "alerts"]
      ],
      how: [
        "OpenTelemetry/OTLP → Tempo (traces) + Prometheus (metrics) → Grafana (dashboards).",
        "Per-request metrics (latency, status, account_id) land in TimescaleDB, flushed every 60s.",
        "Every metric carries account_id → per-tenant visibility, not just system-wide averages."
      ],
      killer: "Not just 'the system is up' — I can prove THIS tenant is being served well." },

    { n: 8, tier: "B", name: "Runtime Cost", q: "How much per reply — and how do I cap it?",
      image: "images/008.svg",
      imageAlt: "Runtime cost comparison — Pure MCP (5 servers × 20 tools = 100 schemas in the system prompt every turn ≈ 15K input tokens, slower TTFT) vs Hybrid (Code Mode / bash for the admin agent + one curated MCP server for the customer agent ≈ 3K input tokens per agent, faster TTFT, ~80% lower per-reply input cost)",
      simple: "Tool schemas live in the system prompt — the model sees every one of them on every turn, even when it calls zero. Pure MCP with 100 tools costs ~15K input tokens per reply, paid forever. Hybrid splits the bill by caller: bash for the admin agent (one tool, unlimited reach), curated MCP for the customer agent (typed, discoverable). Same capability, ~80% less input per turn.",
      how: [
        "Pure MCP: 5 servers × 20 tools = 100 schemas in the system prompt every turn. ~15K input tokens × hundreds of replies/day = real money + real latency.",
        "Hybrid (my ai-contact-bun repo): admin core agent uses Code Mode — one bash tool composes any CLI/SQL. Customer service agent uses one curated MCP server (~20 typed tools).",
        "Right tool for the right caller — power user gets unlimited reach via bash; guided caller gets discoverability + guardrails via MCP. Same capability, ~80% lower per-turn input cost."
      ],
      killer: "Capability is free. Exposure is not — every tool in the prompt is paid for, whether the LLM calls it or not." },

    { n: 9, tier: "B", name: "Human-in-the-Loop", q: "When does a human decide?",
      diagram:
        "Risky action          → LOCKED_REVIEW_ACTIONS  → blocked, queued for approval\n" +
        "Per-action risk tier  → auto / review / block  → each tenant configures\n" +
        "AI can't handle       → escalate_human skill   → handed to a person (24h auto-reset)",
      simple: "A designed checkpoint, not a failure. The AI runs autonomously, but specific decisions are routed to a human on purpose.",
      how: [
        "Risky actions (refunds, returns) are blocked and queued for human approval.",
        "Per-action risk tiers: auto / review / block — each tenant sets their own appetite.",
        "Dangerous actions are LOCKED to 'review' and cannot be downgraded — the floor is the guarantee."
      ],
      killer: "Risk isn't hardcoded — it's a per-tenant policy with a non-downgradable floor." },

    { n: 10, tier: "B", name: "Evaluation", q: "How do I know the answers are correct?",
      diagram:
        "Staging (offline)    → promptfoo  → golden tests · regression · red-team · model compare\n" +
        "Production (online)  → custom     → live reply sampling · CSAT · inline verifier\n" +
        "\n" +
        "Grade by: 📏 exact / keyword (instant)  ·  🧠 LLM-as-judge (fast)  ·  👤 human (gold)",
      simple: "Testing if the AI's answers are correct, like giving a student an exam. My honest weak spot — and a roadmap.",
      how: [
        "Staging (offline) via promptfoo: golden tests, regression, red-team, model comparison — runs in CI.",
        "Production (online): live reply sampling + CSAT + inline verifier — the gap I still need to build.",
        "AI is probabilistic, so you can't exact-match — grade fuzzily: keyword / LLM-judge / human."
      ],
      killer: "I can prove the agent is safe and cheap; proving it's measurably accurate over time is my next build." },
  ];

  const grid = document.getElementById("grid");
  const detailView = document.getElementById("detailView");

  function el(tag, cls, text) {
    const node = document.createElement(tag);
    if (cls) node.className = cls;
    if (text != null) node.textContent = text;
    return node;
  }
  function accentVars(tier) {
    // all cards use orange now
    return { accent: "var(--a)", glow: "var(--glow-a)", tint: "rgba(242,106,27,0.08)" };
  }

  const asciiEls = [];
  function buildCard(c, index) {
    const { accent, glow } = accentVars(c.tier);
    const card = el("div", "card");
    card.style.setProperty("--accent", accent);
    card.style.setProperty("--cardglow", glow);
    card.style.setProperty("--ascii-op", "0.42");

    const ascii = el("pre", "ascii");
    card.appendChild(ascii);
    asciiEls.push({ el: ascii, phase: index * 1.27 });

    card.appendChild(el("div", "num", "#" + c.n));
    card.appendChild(el("div", "name", c.name));
    card.addEventListener("click", () => { location.hash = "#" + c.n; });
    return card;
  }

  // Ghostty-style ASCII shimmer: rewrite each card's text grid every frame.
  const RAMP = " ·:~+=*%@";
  const COLS = 40, ROWS = 28;
  function asciiFrame(t) {
    for (const a of asciiEls) {
      let s = "";
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          let v = 0.5
            + 0.30 * Math.sin(x * 0.5 + t * 2.21 + a.phase)
            + 0.22 * Math.cos(y * 0.45 - t * 1.7)
            + 0.18 * Math.sin((x + y) * 0.32 + t * 1.28 + a.phase);
          v = v < 0 ? 0 : v > 1 ? 1 : v;
          s += RAMP[Math.floor(v * (RAMP.length - 1))];
        }
        s += "\n";
      }
      a.el.textContent = s;
    }
    requestAnimationFrame(ts => asciiFrame(ts / 1000));
  }

  // Full-page drill-down. Clicking a card sets location.hash; routing renders the page.
  function renderDetail(index) {
    const c = CARDS[index];
    detailView.replaceChildren();
    const inner = el("div", "d-inner");

    const back = el("button", "d-back", "← All sub-domains");
    back.addEventListener("click", () => { location.hash = ""; });
    inner.appendChild(back);

    const head = el("div", "d-head");
    head.appendChild(el("span", "d-num", "#" + c.n));
    head.appendChild(el("span", null, "·"));
    head.appendChild(el("span", null, c.tier === "A" ? "Tier A · Core runtime loop" : "Tier B · Operational"));
    inner.appendChild(head);

    inner.appendChild(el("h2", "d-name", c.name));
    inner.appendChild(el("div", "d-q", c.q));

    if (c.image) {
      const img = el("img", "d-image");
      img.src = c.image;
      img.alt = c.imageAlt || c.name;
      img.loading = "lazy";
      inner.appendChild(img);
    }

    if (c.diagram) {
      const diagram = el("pre", "d-diagram");
      diagram.textContent = c.diagram;
      inner.appendChild(diagram);
    }

    if (c.table) {
      const tbl = el("table", "d-table");
      const thead = el("thead");
      const trh = el("tr");
      c.table.headers.forEach(h => trh.appendChild(el("th", null, h)));
      thead.appendChild(trh);
      tbl.appendChild(thead);
      const tbody = el("tbody");
      c.table.rows.forEach(row => {
        const tr = el("tr");
        row.forEach(cell => tr.appendChild(el("td", null, cell)));
        tbody.appendChild(tr);
      });
      tbl.appendChild(tbody);
      inner.appendChild(tbl);
    }

    const s1 = el("div", "d-section");
    s1.appendChild(el("div", "d-label", "In plain terms"));
    s1.appendChild(el("p", "d-simple", c.simple));
    if (c.simpleQa) {
      const qaList = el("ul", "d-qa");
      c.simpleQa.forEach(([q, a]) => {
        const li = el("li");
        li.appendChild(el("span", "qa-q", q));
        li.appendChild(el("span", "qa-sep", "→"));
        li.appendChild(el("span", "qa-a", a));
        qaList.appendChild(li);
      });
      s1.appendChild(qaList);
    }
    inner.appendChild(s1);

    const s2 = el("div", "d-section");
    s2.appendChild(el("div", "d-label", "How it works in my repo"));
    const ul = el("ul", "d-list");
    c.how.forEach(h => ul.appendChild(el("li", null, h)));
    s2.appendChild(ul);
    inner.appendChild(s2);

    const s3 = el("div", "d-section");
    s3.appendChild(el("div", "d-label", "Killer line"));
    s3.appendChild(el("div", "d-killer", "“" + c.killer + "”"));
    inner.appendChild(s3);

    const foot = el("div", "d-foot");
    foot.appendChild(el("span", "d-count", "#" + c.n + " of " + CARDS.length));
    const nav = el("div", "d-nav");
    const prev = el("button", null, "‹ prev");
    const next = el("button", null, "next ›");
    prev.addEventListener("click", () => { location.hash = "#" + CARDS[(index - 1 + CARDS.length) % CARDS.length].n; });
    next.addEventListener("click", () => { location.hash = "#" + CARDS[(index + 1) % CARDS.length].n; });
    nav.appendChild(prev); nav.appendChild(next);
    foot.appendChild(nav);
    inner.appendChild(foot);

    detailView.appendChild(inner);
  }

  function route() {
    const n = parseInt(location.hash.replace("#", ""), 10);
    const idx = CARDS.findIndex(c => c.n === n);
    if (idx >= 0) {
      renderDetail(idx);
      detailView.classList.add("open");
      document.querySelector(".stage").style.display = "none";
      window.scrollTo(0, 0);
    } else {
      detailView.classList.remove("open");
      document.querySelector(".stage").style.display = "";
    }
  }
  window.addEventListener("hashchange", route);
  document.addEventListener("keydown", e => {
    if (!detailView.classList.contains("open")) return;
    const idx = CARDS.findIndex(c => c.n === parseInt(location.hash.replace("#", ""), 10));
    if (idx < 0) return;
    if (e.key === "Escape") location.hash = "";
    else if (e.key === "ArrowRight") location.hash = "#" + CARDS[(idx + 1) % CARDS.length].n;
    else if (e.key === "ArrowLeft") location.hash = "#" + CARDS[(idx - 1 + CARDS.length) % CARDS.length].n;
  });

  // Architecture / Prototype: same card style, no number, no detail page.
  // Optional href opens an external link in a new tab.
  function buildExtraCard(name, phaseIndex, href) {
    const card = el("div", "card extra");
    card.style.setProperty("--accent", "var(--a)");
    card.style.setProperty("--cardglow", "var(--glow-a)");
    card.style.setProperty("--ascii-op", "0.42");
    const ascii = el("pre", "ascii");
    card.appendChild(ascii);
    asciiEls.push({ el: ascii, phase: phaseIndex * 1.27 });
    card.appendChild(el("div", "name", name));
    if (href) {
      card.addEventListener("click", () => window.open(href, "_blank", "noopener,noreferrer"));
    }
    return card;
  }
  function revealCards() {
    document.querySelectorAll(".card").forEach((card, idx) => setTimeout(() => card.classList.add("in"), idx * 90));
  }
  function render() {
    asciiEls.length = 0;
    grid.replaceChildren();
    CARDS.forEach((c, i) => grid.appendChild(buildCard(c, i)));
    grid.appendChild(buildExtraCard("Prototype for FeedMe", CARDS.length, "https://feedm.carrickcheah.com/#app/customer-facing-agent"));
    grid.appendChild(buildExtraCard("My Portfolio", CARDS.length + 1, "https://ui.bolehgpt.com/login"));
    revealCards();
  }
  render();
  route();
  requestAnimationFrame(ts => asciiFrame(ts / 1000));

  // Cycle the keyword every 5s with a smooth blur-slide: Harness → Prompt → Context.
  // The slot is locked to the widest word so the rest of the sentence never shifts.
  const WORDS = ["Harness", "Prompt", "Context"];
  const cycleEl = document.getElementById("cycle");
  const cycleWrap = document.querySelector(".cycle-wrap");

  function sizeSlot() {
    const cs = getComputedStyle(cycleEl);
    const probe = document.createElement("span");
    probe.style.cssText = "position:absolute;visibility:hidden;white-space:pre;";
    probe.style.fontSize = cs.fontSize;
    probe.style.fontFamily = cs.fontFamily;
    probe.style.fontWeight = cs.fontWeight;
    probe.style.letterSpacing = cs.letterSpacing;
    document.body.appendChild(probe);
    let max = 0;
    for (const w of WORDS) { probe.textContent = w; max = Math.max(max, probe.offsetWidth); }
    document.body.removeChild(probe);
    cycleWrap.style.width = Math.ceil(max) + "px";
  }
  sizeSlot();
  window.addEventListener("resize", sizeSlot);

  let busy = false;
  function changeWord(text) {
    if (busy) return;
    busy = true;
    cycleEl.classList.add("out");                 // slide up + blur out
    setTimeout(() => {
      cycleEl.textContent = text;
      cycleEl.style.transition = "none";          // jump below instantly
      cycleEl.classList.remove("out");
      cycleEl.classList.add("down");
      void cycleEl.offsetWidth;                   // force reflow
      cycleEl.style.transition = "";              // restore, then settle in
      cycleEl.classList.remove("down");
      setTimeout(() => { busy = false; }, 420);
    }, 400);
  }

  let wi = 0;
  setInterval(() => {
    wi = (wi + 1) % WORDS.length;
    changeWord(WORDS[wi]);
  }, 5000);
</script>
</body>
