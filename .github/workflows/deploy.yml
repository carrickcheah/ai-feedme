name: Deploy

# Runs on the self-hosted runner that lives on ai-kiss-me. No SSH needed —
# the runner IS the deploy target. Triggered on push to main or manually.

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: deploy-ai-kiss-me
  cancel-in-progress: false

env:
  PUBLIC_URL: https://feedm.carrickcheah.com

jobs:
  deploy:
    runs-on: [self-hosted, feedme-vm]
    timeout-minutes: 15
    steps:
      - name: Pull + rebuild + restart
        run: bash ~/ai-feedme/deploy/deploy.sh

      - name: Wait for app to settle
        run: sleep 10

      - name: Public health check
        env:
          URL: ${{ env.PUBLIC_URL }}
        run: |
          curl -fsS --retry 6 --retry-delay 5 --retry-all-errors \
            "$URL/health" | tee /dev/stderr | grep -q '"status":"ok"'

      - name: Summary
        if: always()
        env:
          COMMIT_SHA: ${{ github.sha }}
          JOB_STATUS: ${{ job.status }}
          URL: ${{ env.PUBLIC_URL }}
        run: |
          {
            echo "### Deploy result"
            echo ""
            echo "- target: $URL"
            echo "- commit: $COMMIT_SHA"
            echo "- status: $JOB_STATUS"
          } >> "$GITHUB_STEP_SUMMARY"
