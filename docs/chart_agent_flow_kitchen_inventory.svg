<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1280" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/>
    </marker>
    <style>
      .title { font-size: 22px; font-weight: 700; fill: #111; }
      .subtitle { font-size: 13px; fill: #6b7280; }
      .label { font-size: 13px; font-weight: 600; fill: #111; }
      .label-sm { font-size: 11px; fill: #374151; }
      .label-mono { font-size: 11px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; fill: #1f2937; }
      .label-event { font-size: 12px; font-weight: 700; fill: #c2410c; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .legend-text { font-size: 11px; fill: #374151; }
      .group-label { font-size: 11px; font-weight: 700; fill: #6b7280; letter-spacing: 1px; }
    </style>
  </defs>

  <!-- Title -->
  <text x="40" y="40" class="title">Kitchen + Inventory Agent Flow</text>
  <text x="40" y="62" class="subtitle">Event-driven chain triggered by one POST /api/chat/sync — Kafka or in-process fallback, same code path.</text>

  <!-- Legend -->
  <g transform="translate(720, 28)">
    <rect x="0" y="0" width="340" height="78" rx="6" fill="#f9fafb" stroke="#e5e7eb"/>
    <text x="12" y="18" class="group-label">LEGEND</text>
    <rect x="12" y="26" width="14" height="14" rx="3" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="34" y="37" class="legend-text">Agent (LLM + runAgent loop)</text>
    <rect x="180" y="26" width="14" height="14" rx="3" fill="#fed7aa" stroke="#ea580c"/>
    <text x="202" y="37" class="legend-text">Event (Kafka topic)</text>
    <rect x="12" y="48" width="14" height="14" rx="3" fill="#dcfce7" stroke="#16a34a"/>
    <text x="34" y="59" class="legend-text">Pure code (no LLM)</text>
    <rect x="180" y="48" width="14" height="14" rx="3" fill="#f3f4f6" stroke="#6b7280"/>
    <text x="202" y="59" class="legend-text">SQLite DB</text>
  </g>

  <!-- ─────────────────────────────────────────── -->
  <!-- 1. HTTP entry -->
  <g transform="translate(380, 100)">
    <rect width="240" height="48" rx="6" fill="#fff" stroke="#374151" stroke-width="2"/>
    <text x="120" y="22" text-anchor="middle" class="label">POST /api/chat/sync</text>
    <text x="120" y="38" text-anchor="middle" class="label-sm">"1 Mango Iceyoo please"</text>
  </g>
  <path d="M 500 148 L 500 178" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 2. customer-facing agent -->
  <g transform="translate(340, 180)">
    <rect width="320" height="100" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="160" y="22" text-anchor="middle" class="label">customer-facing.ts</text>
    <text x="160" y="40" text-anchor="middle" class="label-sm">runAgent({ allowedMcpServers: [pos, payment] })</text>
    <text x="160" y="60" text-anchor="middle" class="label-mono">tools: pos__search_menu</text>
    <text x="160" y="76" text-anchor="middle" class="label-mono">tools: pos__create_order</text>
    <text x="160" y="92" text-anchor="middle" class="label-sm">returns: "Order ORD-… confirmed, RM12.90"</text>
  </g>
  <path d="M 500 280 L 500 310" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 3. order.created event -->
  <g transform="translate(380, 312)">
    <rect width="240" height="44" rx="22" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
    <text x="120" y="20" text-anchor="middle" class="label-event">order.created</text>
    <text x="120" y="35" text-anchor="middle" class="label-sm">{order_id, items[], customer_id}</text>
  </g>

  <!-- side note: publisher -->
  <g transform="translate(40, 312)">
    <rect width="280" height="44" rx="6" fill="#fff" stroke="#9ca3af" stroke-dasharray="3,3"/>
    <text x="140" y="20" text-anchor="middle" class="label-sm">publisher.ts</text>
    <text x="140" y="35" text-anchor="middle" class="label-sm">try Kafka → on fail → in-process call</text>
  </g>
  <path d="M 320 334 L 380 334" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="3,3" fill="none"/>

  <path d="M 500 356 L 500 386" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>

  <!-- 4. kitchen.ts agent -->
  <g transform="translate(280, 388)">
    <rect width="440" height="180" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="220" y="22" text-anchor="middle" class="label">kitchen.ts — handleOrderCreated(event)</text>

    <!-- Step 1: build synthetic prompt -->
    <text x="20" y="46" class="label-sm">1. Build synthetic user message from the event payload:</text>
    <text x="36" y="64" class="label-mono">"Order ORD-X just came in via web. Items: 1× mango_iceyoo …"</text>

    <!-- Step 2: runAgent -->
    <text x="20" y="86" class="label-sm">2. runAgent({ allowed: [pos, kitchen-display, supplier], turns: 5 })</text>
    <text x="36" y="104" class="label-mono">tools: kitchen-display__send_ticket</text>
    <text x="36" y="120" class="label-mono">tools: supplier__record_ingredient_consumption</text>

    <!-- Step 3: query DB -->
    <text x="20" y="142" class="label-sm">3. Query supplier.db for consumption rows, dedupe by ingredient_id</text>
    <text x="20" y="160" class="label-sm">4. For each unique ingredient → publishIngredientConsumed(...)</text>
  </g>

  <!-- supplier.db on right -->
  <g transform="translate(750, 430)">
    <rect width="120" height="50" rx="6" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
    <text x="60" y="22" text-anchor="middle" class="label">supplier.db</text>
    <text x="60" y="38" text-anchor="middle" class="label-sm">stock decrement</text>
  </g>
  <path d="M 720 475 L 750 455" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <path d="M 500 568 L 500 598" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 5. fan-out loop indicator -->
  <g transform="translate(370, 600)">
    <rect width="260" height="36" rx="4" fill="#fff" stroke="#374151" stroke-dasharray="3,3"/>
    <text x="130" y="22" text-anchor="middle" class="label-sm">for each unique ingredient (1..N events)</text>
  </g>
  <path d="M 500 636 L 500 666" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>

  <!-- 6. ingredient.consumed event -->
  <g transform="translate(360, 668)">
    <rect width="280" height="44" rx="22" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
    <text x="140" y="20" text-anchor="middle" class="label-event">ingredient.consumed</text>
    <text x="140" y="35" text-anchor="middle" class="label-sm">{ingredient_id, qty, remaining_stock}</text>
  </g>
  <path d="M 500 712 L 500 742" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>

  <!-- 7. inventory.ts agent -->
  <g transform="translate(260, 744)">
    <rect width="480" height="190" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="240" y="22" text-anchor="middle" class="label">inventory.ts — handleIngredientConsumed(event)</text>

    <text x="20" y="46" class="label-sm">1. Build synthetic user message from the event payload</text>
    <text x="20" y="68" class="label-sm">2. runAgent({ allowed: [supplier only], turns: 3, tokens: 512 })</text>
    <text x="36" y="86" class="label-mono">tools: supplier__get_ingredient_stock</text>
    <text x="36" y="102" class="label-mono">if stock_qty &lt;= par_qty:</text>
    <text x="52" y="118" class="label-mono">  tools: supplier__list_suppliers</text>
    <text x="52" y="134" class="label-mono">  tools: supplier__place_order</text>
    <text x="20" y="156" class="label-sm">3. Snapshot supplier.db (name, stock_qty, par_qty)</text>
    <text x="20" y="174" class="label-sm">4. If stock_qty &lt; par_qty: findAffectedSkus(pos.db) + publishStockLow(...)</text>
  </g>

  <!-- pos.db -->
  <g transform="translate(750, 850)">
    <rect width="120" height="50" rx="6" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
    <text x="60" y="22" text-anchor="middle" class="label">pos.db</text>
    <text x="60" y="38" text-anchor="middle" class="label-sm">menu_item lookup</text>
  </g>
  <path d="M 740 890 L 750 880" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <path d="M 500 934 L 500 964" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 8. stock.low event (conditional) -->
  <g transform="translate(330, 966)">
    <rect width="340" height="44" rx="22" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
    <text x="170" y="20" text-anchor="middle" class="label-event">stock.low  (only if stock_qty &lt; par_qty)</text>
    <text x="170" y="35" text-anchor="middle" class="label-sm">{ingredient_id, affected_skus[], reorder_triggered}</text>
  </g>
  <path d="M 500 1010 L 500 1040" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>

  <!-- 9. 86-propagator (pure code, green) -->
  <g transform="translate(310, 1042)">
    <rect width="380" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="190" y="22" text-anchor="middle" class="label">86-propagator.ts — handleStockLow(event)</text>
    <text x="190" y="42" text-anchor="middle" class="label-sm">No LLM. Pure SQL.</text>
    <text x="190" y="60" text-anchor="middle" class="label-mono">UPDATE menu_item SET is_available = 0 WHERE sku IN (...)</text>
    <text x="190" y="74" text-anchor="middle" class="label-sm">Next pos__search_menu sees the item gone.</text>
  </g>

  <!-- pos.db (write) -->
  <g transform="translate(750, 1064)">
    <rect width="120" height="44" rx="6" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
    <text x="60" y="22" text-anchor="middle" class="label">pos.db</text>
    <text x="60" y="38" text-anchor="middle" class="label-sm">is_available = 0</text>
  </g>
  <path d="M 690 1082 L 750 1086" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- bottom note -->
  <g transform="translate(40, 1160)">
    <rect width="1020" height="90" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="20" y="22" class="group-label">PATTERN</text>
    <text x="20" y="42" class="label-sm">Each event-driven agent = handler that converts an event payload into a synthetic user message,</text>
    <text x="20" y="58" class="label-sm">runs the shared multi-turn tool loop with a job-specific system prompt + MCP allowlist,</text>
    <text x="20" y="74" class="label-sm">then publishes the next event based on the resulting DB state. Kafka or in-process — same handler signature either way.</text>
  </g>
</svg>
