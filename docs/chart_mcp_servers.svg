    <text x="130" y="22" text-anchor="middle" class="colT">Supplier</text>
    <text x="130" y="40" text-anchor="middle" class="colS">port 4014</text>

    <g transform="translate(0, 64)">
      <rect width="260" height="218" rx="8" fill="#4738a0" stroke="#afa9ec"/>
      <text x="14" y="20" class="sectT">TOOLS · 5</text>
      <g transform="translate(14, 30)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">supplier__list_suppliers</text></g>
      <g transform="translate(14, 62)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">supplier__get_ingredient_stock</text></g>
      <g transform="translate(14, 94)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">supplier__place_order</text></g>
      <g transform="translate(14, 126)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">supplier__get_lead_time</text></g>
      <g transform="translate(14, 158)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">supplier__record_ingredient…</text></g>
    </g>

    <line x1="130" y1="284" x2="130" y2="310" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arr2)"/>
    <g transform="translate(0, 312)">
      <rect width="260" height="220" rx="8" fill="#1e4633" stroke="#86c9aa"/>
      <text x="14" y="22" class="dbName">supplier.db</text>
      <text x="14" y="40" class="sectT">TABLES · 5</text>
      <g transform="translate(14, 50)"><rect width="232" height="22" rx="3" fill="#143324"/><text x="14" y="16" class="item">supplier</text></g>
      <g transform="translate(14, 78)"><rect width="232" height="22" rx="3" fill="#143324"/><text x="14" y="16" class="item">ingredient</text></g>
      <g transform="translate(14, 106)"><rect width="232" height="22" rx="3" fill="#143324"/><text x="14" y="16" class="item">supplier_order</text></g>
      <g transform="translate(14, 134)"><rect width="232" height="22" rx="3" fill="#143324"/><text x="14" y="16" class="item">supplier_order_line</text></g>
      <g transform="translate(14, 162)"><rect width="232" height="22" rx="3" fill="#143324"/><text x="14" y="16" class="item">ingredient_consumption</text></g>
