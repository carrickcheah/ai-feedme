    <!-- Header -->
    <rect width="260" height="52" rx="8" fill="#FF7518" stroke="#e6a44e"/>
    <text x="130" y="22" text-anchor="middle" class="colT">POS</text>
    <text x="130" y="40" text-anchor="middle" class="colS">port 4001</text>

    <!-- Tools -->
    <g transform="translate(0, 64)">
      <rect width="260" height="186" rx="8" fill="#4738a0" stroke="#afa9ec"/>
      <text x="14" y="20" class="sectT">TOOLS · 4</text>
      <g transform="translate(14, 30)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">pos__search_menu</text></g>
      <g transform="translate(14, 62)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">pos__get_order</text></g>
      <g transform="translate(14, 94)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">pos__create_order</text></g>
      <g transform="translate(14, 126)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">pos__update_order_status</text></g>
    </g>

