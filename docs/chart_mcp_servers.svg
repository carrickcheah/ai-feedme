<svg width="100%" viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9c9a92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title    { font-size: 18px; font-weight: 700; fill: #fff; }
      .subtitle { font-size: 12px; fill: #b4b2a9; }
      .colT     { font-size: 14px; font-weight: 700; fill: #fff; }
      .colS     { font-size: 11px; fill: rgba(255,255,255,0.7); font-family: ui-monospace, SFMono-Regular, monospace; }
      .sectT    { font-size: 10px; font-weight: 700; fill: rgba(255,255,255,0.65); letter-spacing: 0.08em; }
      .item     { font-size: 12px; fill: #fff; font-family: ui-monospace, SFMono-Regular, monospace; }
      .dbName   { font-size: 13px; font-weight: 700; fill: #fff; font-family: ui-monospace, SFMono-Regular, monospace; }
      .legendT  { font-size: 10px; font-weight: 700; fill: #c2c0b6; letter-spacing: 0.08em; }
      .legendL  { font-size: 11px; fill: #b4b2a9; }
      .note     { font-size: 11px; fill: #c2c0b6; }
    </style>
  </defs>

  <!-- ── Title ─────────────────────────────────────────────────── -->
  <text x="550" y="34" text-anchor="middle" class="title">MCP servers — tools, DB, skills</text>
  <text x="550" y="54" text-anchor="middle" class="subtitle">4 MCP servers · 17 tools total · 4 SQLite DBs · skills loaded at the agent layer</text>

  <!-- ── Legend ─────────────────────────────────────────────────── -->
  <g transform="translate(820, 70)">
    <rect x="0" y="0" width="260" height="64" rx="6" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="12" y="18" class="legendT">LEGEND</text>
    <rect x="12" y="26" width="12" height="12" rx="3" fill="#4738a0" stroke="#afa9ec"/>
    <text x="30" y="36" class="legendL">Tools (LLM-callable)</text>
    <rect x="148" y="26" width="12" height="12" rx="3" fill="#1e4633" stroke="#86c9aa"/>
    <text x="166" y="36" class="legendL">SQLite DB</text>
    <rect x="12" y="44" width="12" height="12" rx="3" fill="#5c4513" stroke="#e6a44e"/>
    <text x="30" y="54" class="legendL">Skill (agent-level)</text>
  </g>

  <!-- ── Skills strip (agent-level) ─────────────────────────────── -->
  <g transform="translate(20, 80)">
    <rect width="780" height="56" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="14" y="20" class="sectT">SKILLS · loaded by agents at runtime · orthogonal to MCP tools</text>
    <g transform="translate(14, 28)">
      <rect width="140" height="22" rx="11" fill="#5c4513" stroke="#e6a44e"/>
      <text x="70" y="15" text-anchor="middle" class="item">upsell</text>
    </g>
    <g transform="translate(162, 28)">
      <rect width="140" height="22" rx="11" fill="#5c4513" stroke="#e6a44e"/>
      <text x="70" y="15" text-anchor="middle" class="item">vip_protocol</text>
    </g>
    <g transform="translate(310, 28)">
      <rect width="140" height="22" rx="11" fill="#5c4513" stroke="#e6a44e"/>
      <text x="70" y="15" text-anchor="middle" class="item">handle_complaint</text>
    </g>
    <g transform="translate(458, 28)">
      <rect width="140" height="22" rx="11" fill="#5c4513" stroke="#e6a44e"/>
      <text x="70" y="15" text-anchor="middle" class="item">allergen_check</text>
