    <text x="130" y="22" text-anchor="middle" class="colT">Kitchen Display</text>
    <text x="130" y="40" text-anchor="middle" class="colS">port 4002</text>

    <g transform="translate(0, 64)">
      <rect width="260" height="186" rx="8" fill="#4738a0" stroke="#afa9ec"/>
      <text x="14" y="20" class="sectT">TOOLS · 4</text>
      <g transform="translate(14, 30)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">kitchen-display__send_ticket</text></g>
      <g transform="translate(14, 62)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">kitchen-display__mark_ready</text></g>
      <g transform="translate(14, 94)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">kitchen-display__expedite</text></g>
      <g transform="translate(14, 126)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">kitchen-display__get_queue</text></g>
    </g>

