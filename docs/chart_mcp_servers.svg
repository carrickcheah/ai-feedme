    <g transform="translate(0, 280)">
      <rect width="260" height="184" rx="8" fill="#1e4633" stroke="#86c9aa"/>
      <text x="14" y="22" class="dbName">kitchen-display.db</text>
      <text x="14" y="40" class="sectT">TABLES · 3</text>
      <g transform="translate(14, 50)"><rect width="232" height="22" rx="3" fill="#143324"/><text x="14" y="16" class="item">ticket</text></g>
      <g transform="translate(14, 78)"><rect width="232" height="22" rx="3" fill="#143324"/><text x="14" y="16" class="item">ticket_line</text></g>
      <g transform="translate(14, 106)"><rect width="232" height="22" rx="3" fill="#143324"/><text x="14" y="16" class="item">station</text></g>
