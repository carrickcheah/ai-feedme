      <rect width="260" height="186" rx="8" fill="#4738a0" stroke="#afa9ec"/>
      <text x="14" y="20" class="sectT">TOOLS · 4</text>
      <g transform="translate(14, 30)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">payment__process_payment</text></g>
      <g transform="translate(14, 62)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">payment__void_payment</text></g>
      <g transform="translate(14, 94)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">payment__refund</text></g>
      <g transform="translate(14, 126)"><rect width="232" height="26" rx="4" fill="#2d2275"/><text x="14" y="18" class="item">payment__get_payment</text></g>
