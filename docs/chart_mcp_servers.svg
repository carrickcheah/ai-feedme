      <text x="14" y="22" class="dbName">pos.db</text>
      <text x="14" y="40" class="sectT">TABLES · 4</text>
      <g transform="translate(14, 50)"><rect width="232" height="22" rx="3" fill="#143324"/><text x="14" y="16" class="item">menu_item</text></g>
      <g transform="translate(14, 78)"><rect width="232" height="22" rx="3" fill="#143324"/><text x="14" y="16" class="item">order</text></g>
      <g transform="translate(14, 106)"><rect width="232" height="22" rx="3" fill="#143324"/><text x="14" y="16" class="item">order_line</text></g>
      <g transform="translate(14, 134)"><rect width="232" height="22" rx="3" fill="#143324"/><text x="14" y="16" class="item">customer</text></g>
    </g>
