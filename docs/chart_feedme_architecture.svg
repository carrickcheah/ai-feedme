<svg width="100%" viewBox="0 0 1100 940" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <marker id="ar4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9c9a92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ar4-o" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#F08531" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title    { font-size: 18px; font-weight: 700; fill: #fff; }
      .subtitle { font-size: 12px; fill: #b4b2a9; }
      .boxT     { font-size: 14px; font-weight: 600; fill: #fff; }
      .boxS     { font-size: 11px; fill: rgba(255,255,255,0.75); }
      .boxM     { font-size: 11px; fill: rgba(255,255,255,0.85); font-family: ui-monospace, SFMono-Regular, monospace; }
      .badge    { font-size: 10px; font-weight: 700; fill: #fff; letter-spacing: 0.04em; }
      .annot    { font-size: 11px; fill: #c2c0b6; }
      .legendT  { font-size: 10px; font-weight: 700; fill: #c2c0b6; letter-spacing: 0.08em; }
      .legendL  { font-size: 11px; fill: #b4b2a9; }
      .tierT    { font-size: 10px; font-weight: 700; fill: rgba(255,255,255,0.5); letter-spacing: 0.12em; }
    </style>
  </defs>

  <!-- ── Title ─────────────────────────────────────────────────── -->
  <text x="440" y="34" text-anchor="middle" class="title">FeedMe architecture · simplified, no orchestrator</text>
  <text x="440" y="54" text-anchor="middle" class="subtitle">Customer-facing Agent is the entry point · Kitchen + Inventory wake on events · MemGC as cross-cutting memory</text>

  <!-- ── Legend ─────────────────────────────────────────────────── -->
  <g transform="translate(840, 70)">
    <rect x="0" y="0" width="240" height="78" rx="6" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="12" y="18" class="legendT">LEGEND</text>
    <rect x="12" y="26" width="12" height="12" rx="3" fill="#4738a0" stroke="#afa9ec"/>
    <text x="30" y="36" class="legendL">Agent (LLM-driven)</text>
    <rect x="12" y="44" width="12" height="12" rx="3" fill="#1e4633" stroke="#86c9aa"/>
    <text x="30" y="54" class="legendL">MCP server / DB</text>
    <rect x="12" y="62" width="12" height="12" rx="3" fill="#5c4513" stroke="#e6a44e"/>
    <text x="30" y="72" class="legendL">Edge / event bus</text>
  </g>

  <!-- ════════ TIER 1: Customer touchpoints ════════ -->
  <text x="40" y="86" class="tierT">CUSTOMER EDGE</text>
  <g transform="translate(280, 96)">
    <rect width="320" height="56" rx="8" fill="#5c4513" stroke="#e6a44e"/>
    <text x="160" y="22" text-anchor="middle" class="boxT">Customer touchpoints</text>
    <text x="160" y="42" text-anchor="middle" class="boxS">Kiosk · Mobile · Web (FeedMe App)</text>
  </g>
  <line x1="440" y1="152" x2="440" y2="180" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar4)"/>

  <!-- ════════ TIER 2: Customer-facing Agent ════════ -->
  <text x="40" y="174" class="tierT">ENTRY</text>
  <g transform="translate(280, 182)">
    <rect width="320" height="62" rx="8" fill="#4738a0" stroke="#afa9ec"/>
    <text x="160" y="22" text-anchor="middle" class="boxT">Customer-facing Agent</text>
    <text x="160" y="38" text-anchor="middle" class="boxS">HTTP-triggered · synchronous chat</text>
    <text x="160" y="52" text-anchor="middle" class="boxM">/api/chat/sync</text>
  </g>
  <text x="450" y="262" class="annot">publishes order events</text>
  <line x1="440" y1="244" x2="440" y2="278" stroke="#F08531" stroke-width="1.8" marker-end="url(#ar4-o)"/>

  <!-- Memory layer on right (spans tiers) -->
  <g transform="translate(640, 182)">
    <rect width="180" height="170" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="22" class="boxT">Memory layer</text>
    <text x="14" y="40" class="boxS">cross-cutting · all agents</text>

    <g transform="translate(10, 54)">
      <rect width="160" height="44" rx="6" fill="#143324" stroke="#86c9aa" stroke-opacity="0.6"/>
      <text x="80" y="20" text-anchor="middle" class="boxT" font-size="12">MemGC</text>
      <text x="80" y="36" text-anchor="middle" class="boxS" font-size="10">PRISM retrieval · 10–13 LLM</text>
    </g>
    <g transform="translate(10, 108)">
      <rect width="160" height="44" rx="6" fill="#143324" stroke="#86c9aa" stroke-opacity="0.6"/>
      <text x="80" y="20" text-anchor="middle" class="boxT" font-size="12">Redis</text>
      <text x="80" y="36" text-anchor="middle" class="boxS" font-size="10">memgc.answer cache · TTL 300s</text>
    </g>
  </g>
  <line x1="600" y1="213" x2="640" y2="218" stroke="#9c9a92" stroke-width="1.2" stroke-dasharray="3,3" marker-end="url(#ar4)"/>
  <text x="608" y="207" class="annot" font-size="10">reads</text>

  <!-- ════════ TIER 3: Event bus ════════ -->
  <text x="40" y="294" class="tierT">EVENT BUS</text>
  <g transform="translate(160, 280)">
    <rect width="560" height="60" rx="8" fill="#5c4513" stroke="#e6a44e"/>
    <text x="280" y="22" text-anchor="middle" class="boxT">Event bus (Kafka · in-process fallback)</text>
    <text x="280" y="42" text-anchor="middle" class="boxM">order.created · ingredient.consumed · stock.low · ticket.ready</text>
  </g>

  <!-- Two parallel triggers down -->
  <line x1="300" y1="340" x2="300" y2="380" stroke="#F08531" stroke-width="1.8" marker-end="url(#ar4-o)"/>
  <line x1="580" y1="340" x2="580" y2="380" stroke="#F08531" stroke-width="1.8" marker-end="url(#ar4-o)"/>
  <text x="306" y="362" class="annot" font-size="10" fill="#F08531">wakes</text>
  <text x="586" y="362" class="annot" font-size="10" fill="#F08531">wakes</text>

  <!-- ════════ TIER 4: Event-driven agents ════════ -->
  <text x="40" y="396" class="tierT">EVENT-DRIVEN AGENTS</text>
  <g transform="translate(160, 382)">
    <rect width="280" height="64" rx="8" fill="#4738a0" stroke="#afa9ec"/>
    <text x="140" y="22" text-anchor="middle" class="boxT">Kitchen Agent</text>
    <text x="140" y="40" text-anchor="middle" class="boxS">Sequencing &amp; ticket dispatch</text>
    <text x="140" y="56" text-anchor="middle" class="boxM">trigger: order.created</text>
  </g>
  <g transform="translate(440, 382)">
    <rect width="280" height="64" rx="8" fill="#4738a0" stroke="#afa9ec"/>
    <text x="140" y="22" text-anchor="middle" class="boxT">Inventory Agent</text>
    <text x="140" y="40" text-anchor="middle" class="boxS">Stock check + auto-reorder + 86</text>
    <text x="140" y="56" text-anchor="middle" class="boxM">trigger: ingredient.consumed</text>
  </g>

  <line x1="300" y1="446" x2="300" y2="482" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar4)"/>
  <line x1="580" y1="446" x2="580" y2="482" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar4)"/>

  <!-- ════════ TIER 5: MCP servers ════════ -->
  <text x="40" y="498" class="tierT">TOOLS · MCP SERVERS</text>
  <text x="440" y="476" text-anchor="middle" class="annot">agents call MCP servers directly · allowlist = security boundary</text>

  <g transform="translate(40, 484)">
    <rect width="180" height="58" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="90" y="22" text-anchor="middle" class="boxT">POS</text>
    <text x="90" y="40" text-anchor="middle" class="boxM">:4001 · 4 tools</text>
  </g>
  <g transform="translate(232, 484)">
    <rect width="180" height="58" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="90" y="22" text-anchor="middle" class="boxT">Kitchen Display</text>
    <text x="90" y="40" text-anchor="middle" class="boxM">:4002 · 4 tools</text>
  </g>
  <g transform="translate(424, 484)">
    <rect width="180" height="58" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="90" y="22" text-anchor="middle" class="boxT">Payment</text>
    <text x="90" y="40" text-anchor="middle" class="boxM">:4013 · 4 tools</text>
  </g>
  <g transform="translate(616, 484)">
    <rect width="180" height="58" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="90" y="22" text-anchor="middle" class="boxT">Supplier</text>
    <text x="90" y="40" text-anchor="middle" class="boxM">:4014 · 5 tools</text>
  </g>

  <!-- Down to DBs -->
  <line x1="130" y1="542" x2="130" y2="572" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#ar4)"/>
  <line x1="322" y1="542" x2="322" y2="572" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#ar4)"/>
  <line x1="514" y1="542" x2="514" y2="572" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#ar4)"/>
  <line x1="706" y1="542" x2="706" y2="572" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#ar4)"/>

  <!-- ════════ TIER 6: SQLite DBs ════════ -->
  <text x="40" y="588" class="tierT">STORAGE · SQLITE (WAL)</text>

  <g transform="translate(40, 574)">
    <rect width="180" height="48" rx="8" fill="#0e2218" stroke="#86c9aa" stroke-opacity="0.6"/>
    <text x="90" y="20" text-anchor="middle" class="boxM" font-size="13">pos.db</text>
    <text x="90" y="36" text-anchor="middle" class="boxS" font-size="10">menu_item · order · …</text>
  </g>
  <g transform="translate(232, 574)">
    <rect width="180" height="48" rx="8" fill="#0e2218" stroke="#86c9aa" stroke-opacity="0.6"/>
    <text x="90" y="20" text-anchor="middle" class="boxM" font-size="13">kitchen-display.db</text>
    <text x="90" y="36" text-anchor="middle" class="boxS" font-size="10">ticket · ticket_line</text>
  </g>
  <g transform="translate(424, 574)">
    <rect width="180" height="48" rx="8" fill="#0e2218" stroke="#86c9aa" stroke-opacity="0.6"/>
    <text x="90" y="20" text-anchor="middle" class="boxM" font-size="13">payment.db</text>
    <text x="90" y="36" text-anchor="middle" class="boxS" font-size="10">payment_intent · refund</text>
  </g>
  <g transform="translate(616, 574)">
    <rect width="180" height="48" rx="8" fill="#0e2218" stroke="#86c9aa" stroke-opacity="0.6"/>
    <text x="90" y="20" text-anchor="middle" class="boxM" font-size="13">supplier.db</text>
    <text x="90" y="36" text-anchor="middle" class="boxS" font-size="10">ingredient · supplier_order</text>
  </g>

  <!-- ════════ INFRASTRUCTURE STRIP ════════ -->
  <text x="40" y="660" class="tierT">CROSS-CUTTING INFRASTRUCTURE</text>

  <g transform="translate(40, 670)">
    <rect width="246" height="72" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="14" y="22" class="boxT">Skills repository</text>
    <text x="14" y="40" class="boxS">5 procedural playbooks</text>
    <text x="14" y="56" class="boxM">upsell · vip_protocol · 86…</text>
  </g>
  <g transform="translate(296, 670)">
    <rect width="246" height="72" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="14" y="22" class="boxT">Observability</text>
    <text x="14" y="40" class="boxS">OTLP → Langfuse Cloud</text>
    <text x="14" y="56" class="boxM">feedme.agent.run / .tool.call / .memgc.answer</text>
  </g>
  <g transform="translate(552, 670)">
    <rect width="246" height="72" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="14" y="22" class="boxT">Evaluation</text>
    <text x="14" y="40" class="boxS">Promptfoo · Azure GPT-5.5 rubric grader</text>
    <text x="14" y="56" class="boxM">30 tests · 4 suites · 80% baseline</text>
  </g>

  <!-- ════════ Bottom annotation ════════ -->
  <g transform="translate(40, 770)">
    <rect width="1020" height="60" rx="6" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="510" y="22" text-anchor="middle" class="boxT" font-size="13">No central orchestrator · agents coordinate through the event bus</text>
    <text x="510" y="40" text-anchor="middle" class="boxS">Customer-facing returns to the user FAST · async agents handle side-effects · auto-86 propagates back to pos.db</text>
    <text x="510" y="56" text-anchor="middle" class="annot">Each agent is ~80–140 lines of TS. The shared multi-turn loop lives in src/agents/agent-base.ts.</text>
  </g>

  <g transform="translate(40, 850)">
    <rect width="1020" height="80" rx="6" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="14" y="22" class="boxT" font-size="13">Stack at a glance</text>
    <text x="14" y="42" class="boxM">TS · Bun · Hono · Azure GPT-5.5 · 4 HTTP MCP servers · SQLite WAL · Kafka KRaft (in-proc fallback) · Python memgc-service sidecar (FastAPI) · Redis · Langfuse OTLP · Promptfoo</text>
    <text x="14" y="64" class="boxS">Frontend: snow-dessert React kiosk (CDN Babel · no build step) · agent code reused from ai-contact-bun &amp; ai-agents</text>
  </g>
</svg>
