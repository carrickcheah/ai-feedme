<svg width="100%" viewBox="0 0 1100 1040" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <marker id="ar4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9c9a92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ar4-o" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#F08531" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ar4-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#86c9aa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title    { font-size: 18px; font-weight: 700; fill: #fff; }
      .subtitle { font-size: 12px; fill: #b4b2a9; }
      .legendInline { font-size: 11px; fill: #b4b2a9; }
      .boxT     { font-size: 14px; font-weight: 600; fill: #fff; }
      .boxS     { font-size: 11px; fill: rgba(255,255,255,0.75); }
      .boxM     { font-size: 11px; fill: rgba(255,255,255,0.85); font-family: ui-monospace, SFMono-Regular, monospace; }
      .badge    { font-size: 10px; font-weight: 700; fill: #fff; letter-spacing: 0.04em; }
      .annot    { font-size: 11px; fill: #c2c0b6; }
      .tierT    { font-size: 10px; font-weight: 700; fill: rgba(255,255,255,0.5); letter-spacing: 0.12em; }
    </style>
  </defs>

  <!-- ── Title ─────────────────────────────────────────────────── -->
  <text x="550" y="32" text-anchor="middle" class="title">FeedMe architecture · simplified, no orchestrator</text>
  <text x="550" y="52" text-anchor="middle" class="subtitle">Customer-facing Agent is the entry point · Kitchen + Inventory wake on events · MemGC is cross-cutting</text>
  <!-- Inline legend -->
  <g transform="translate(330, 64)">
    <rect x="0" y="0" width="12" height="12" rx="3" fill="#4738a0" stroke="#afa9ec"/>
    <text x="18" y="10" class="legendInline">Agent (LLM)</text>
    <rect x="110" y="0" width="12" height="12" rx="3" fill="#1e4633" stroke="#86c9aa"/>
    <text x="128" y="10" class="legendInline">MCP server / DB / Memory</text>
    <rect x="290" y="0" width="12" height="12" rx="3" fill="#5c4513" stroke="#e6a44e"/>
    <text x="308" y="10" class="legendInline">Edge / event bus</text>
    <rect x="430" y="0" width="12" height="12" rx="3" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="448" y="10" class="legendInline">Cross-cutting infra</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- Tier 1 · Customer touchpoints                                 -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <text x="20" y="100" class="tierT">CUSTOMER EDGE</text>
  <g transform="translate(220, 96)">
    <rect width="320" height="56" rx="8" fill="#5c4513" stroke="#e6a44e"/>
    <text x="160" y="22" text-anchor="middle" class="boxT">Customer touchpoints</text>
    <text x="160" y="42" text-anchor="middle" class="boxS">Kiosk · Mobile · Web (FeedMe App)</text>
  </g>
  <line x1="380" y1="152" x2="380" y2="180" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar4)"/>

  <!-- Tier 2 · Customer-facing Agent -->
  <text x="20" y="186" class="tierT">ENTRY</text>
  <g transform="translate(220, 182)">
    <rect width="320" height="62" rx="8" fill="#4738a0" stroke="#afa9ec"/>
    <text x="160" y="22" text-anchor="middle" class="boxT">Customer-facing Agent</text>
    <text x="160" y="38" text-anchor="middle" class="boxS">HTTP-triggered · synchronous chat</text>
    <text x="160" y="52" text-anchor="middle" class="boxM">/api/chat/sync</text>
  </g>

  <!-- Tier 3 · Event bus -->
  <text x="20" y="276" class="tierT">EVENT BUS</text>
  <text x="386" y="266" class="annot" fill="#F08531">publishes order events</text>
  <line x1="380" y1="244" x2="380" y2="278" stroke="#F08531" stroke-width="1.8" marker-end="url(#ar4-o)"/>
  <g transform="translate(140, 280)">
    <rect width="480" height="58" rx="8" fill="#5c4513" stroke="#e6a44e"/>
    <text x="240" y="22" text-anchor="middle" class="boxT">Event bus (Kafka · in-process fallback)</text>
    <text x="240" y="42" text-anchor="middle" class="boxM">order.created · ingredient.consumed · stock.low · ticket.ready</text>
  </g>

  <!-- Two parallel triggers down -->
  <line x1="250" y1="338" x2="250" y2="380" stroke="#F08531" stroke-width="1.8" marker-end="url(#ar4-o)"/>
  <line x1="510" y1="338" x2="510" y2="380" stroke="#F08531" stroke-width="1.8" marker-end="url(#ar4-o)"/>
  <text x="256" y="360" class="annot" font-size="10" fill="#F08531">wakes</text>
  <text x="516" y="360" class="annot" font-size="10" fill="#F08531">wakes</text>

  <!-- Tier 4 · Event-driven agents -->
  <text x="20" y="396" class="tierT">EVENT-DRIVEN AGENTS</text>
  <g transform="translate(120, 382)">
    <rect width="260" height="68" rx="8" fill="#4738a0" stroke="#afa9ec"/>
    <text x="130" y="22" text-anchor="middle" class="boxT">Kitchen Agent</text>
    <text x="130" y="40" text-anchor="middle" class="boxS">Sequencing &amp; ticket dispatch</text>
    <text x="130" y="56" text-anchor="middle" class="boxM">trigger: order.created</text>
  </g>
  <g transform="translate(400, 382)">
    <rect width="260" height="68" rx="8" fill="#4738a0" stroke="#afa9ec"/>
    <text x="130" y="22" text-anchor="middle" class="boxT">Inventory Agent</text>
    <text x="130" y="40" text-anchor="middle" class="boxS">Stock check + auto-reorder + 86</text>
    <text x="130" y="56" text-anchor="middle" class="boxM">trigger: ingredient.consumed</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- Memory column · spans tiers 2–4, all 3 agents read it          -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <text x="700" y="186" class="tierT">MEMORY · CROSS-CUTTING</text>
  <g transform="translate(700, 182)">
    <rect width="380" height="268" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="22" class="boxT">Memory layer</text>
    <text x="14" y="40" class="boxS">read by all 3 agents · injected as &lt;memory&gt; in system prompt</text>

    <g transform="translate(14, 54)">
      <rect width="352" height="56" rx="6" fill="#143324" stroke="#86c9aa" stroke-opacity="0.6"/>
      <text x="14" y="22" class="boxT" font-size="13">MemGC</text>
      <text x="14" y="40" class="boxM">PRISM retrieval · 10–13 LLM calls per question</text>
    </g>
    <g transform="translate(14, 120)">
      <rect width="352" height="56" rx="6" fill="#143324" stroke="#86c9aa" stroke-opacity="0.6"/>
      <text x="14" y="22" class="boxT" font-size="13">Redis</text>
      <text x="14" y="40" class="boxM">memgc.answer cache · TTL 300s · sha256(question) key</text>
    </g>

    <!-- "Read by" chip row -->
    <text x="14" y="200" class="tierT" font-size="9">READ BY</text>
    <g transform="translate(14, 208)">
      <rect width="110" height="22" rx="11" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.6"/>
      <text x="55" y="15" text-anchor="middle" class="boxM" font-size="10">Customer-facing</text>
    </g>
    <g transform="translate(130, 208)">
      <rect width="110" height="22" rx="11" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.6"/>
      <text x="55" y="15" text-anchor="middle" class="boxM" font-size="10">Kitchen</text>
    </g>
    <g transform="translate(246, 208)">
      <rect width="110" height="22" rx="11" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.6"/>
      <text x="55" y="15" text-anchor="middle" class="boxM" font-size="10">Inventory</text>
    </g>
    <text x="14" y="252" class="annot" font-size="10">First call cold (~30s) · cached calls instant</text>
  </g>

  <!-- 3 dashed arrows from agents to memory layer -->
  <!-- Customer-facing (y=213, right edge x=540) → Memory left (x=700) -->
  <line x1="540" y1="213" x2="700" y2="213" stroke="#86c9aa" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ar4-g)"/>
  <text x="560" y="208" class="annot" font-size="9" fill="#86c9aa">reads</text>
  <!-- Kitchen (y=416, right edge x=380) → Memory left (x=700, y=416) — long horizontal -->
  <path d="M 380 416 Q 540 416 700 416" fill="none" stroke="#86c9aa" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ar4-g)"/>
  <text x="540" y="412" text-anchor="middle" class="annot" font-size="9" fill="#86c9aa">reads</text>
  <!-- Inventory (y=416, right edge x=660) → Memory left (x=700) -->
  <line x1="660" y1="416" x2="700" y2="416" stroke="#86c9aa" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#ar4-g)"/>

  <!-- Arrows down from agents to MCPs -->
  <line x1="250" y1="450" x2="250" y2="486" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar4)"/>
  <line x1="510" y1="450" x2="510" y2="486" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar4)"/>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- Tier 5 · MCP servers                                          -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <text x="20" y="502" class="tierT">TOOLS · MCP SERVERS</text>
  <text x="550" y="478" text-anchor="middle" class="annot">agents call MCP servers directly · allowedMcpServers = security boundary</text>

  <g transform="translate(40, 488)">
    <rect width="245" height="58" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="122" y="22" text-anchor="middle" class="boxT">POS</text>
    <text x="122" y="40" text-anchor="middle" class="boxM">:4001 · 4 tools</text>
  </g>
  <g transform="translate(295, 488)">
    <rect width="245" height="58" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="122" y="22" text-anchor="middle" class="boxT">Kitchen Display</text>
    <text x="122" y="40" text-anchor="middle" class="boxM">:4002 · 4 tools</text>
  </g>
  <g transform="translate(550, 488)">
    <rect width="245" height="58" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="122" y="22" text-anchor="middle" class="boxT">Payment</text>
    <text x="122" y="40" text-anchor="middle" class="boxM">:4013 · 4 tools</text>
  </g>
  <g transform="translate(805, 488)">
    <rect width="245" height="58" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="122" y="22" text-anchor="middle" class="boxT">Supplier</text>
    <text x="122" y="40" text-anchor="middle" class="boxM">:4014 · 5 tools</text>
  </g>

  <line x1="162" y1="546" x2="162" y2="576" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#ar4)"/>
  <line x1="417" y1="546" x2="417" y2="576" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#ar4)"/>
  <line x1="672" y1="546" x2="672" y2="576" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#ar4)"/>
  <line x1="927" y1="546" x2="927" y2="576" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#ar4)"/>

  <!-- Tier 6 · SQLite DBs -->
  <text x="20" y="592" class="tierT">STORAGE · SQLITE (WAL)</text>

  <g transform="translate(40, 578)">
    <rect width="245" height="48" rx="8" fill="#0e2218" stroke="#86c9aa" stroke-opacity="0.6"/>
    <text x="122" y="20" text-anchor="middle" class="boxM" font-size="13">pos.db</text>
    <text x="122" y="36" text-anchor="middle" class="boxS" font-size="10">menu_item · order · customer · …</text>
  </g>
  <g transform="translate(295, 578)">
    <rect width="245" height="48" rx="8" fill="#0e2218" stroke="#86c9aa" stroke-opacity="0.6"/>
    <text x="122" y="20" text-anchor="middle" class="boxM" font-size="13">kitchen-display.db</text>
    <text x="122" y="36" text-anchor="middle" class="boxS" font-size="10">ticket · ticket_line · station</text>
  </g>
  <g transform="translate(550, 578)">
    <rect width="245" height="48" rx="8" fill="#0e2218" stroke="#86c9aa" stroke-opacity="0.6"/>
    <text x="122" y="20" text-anchor="middle" class="boxM" font-size="13">payment.db</text>
    <text x="122" y="36" text-anchor="middle" class="boxS" font-size="10">payment_intent · refund</text>
  </g>
  <g transform="translate(805, 578)">
    <rect width="245" height="48" rx="8" fill="#0e2218" stroke="#86c9aa" stroke-opacity="0.6"/>
    <text x="122" y="20" text-anchor="middle" class="boxM" font-size="13">supplier.db</text>
    <text x="122" y="36" text-anchor="middle" class="boxS" font-size="10">ingredient · supplier_order · …</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- Infrastructure strip                                          -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <text x="20" y="678" class="tierT">CROSS-CUTTING INFRASTRUCTURE</text>

  <g transform="translate(40, 686)">
    <rect width="330" height="72" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="14" y="22" class="boxT">Skills repository</text>
    <text x="14" y="40" class="boxS">5 procedural playbooks loaded into system prompt</text>
    <text x="14" y="56" class="boxM">upsell · vip_protocol · 86_item_protocol · …</text>
  </g>
  <g transform="translate(385, 686)">
    <rect width="330" height="72" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="14" y="22" class="boxT">Observability</text>
    <text x="14" y="40" class="boxS">OTLP → Langfuse Cloud (one external dep)</text>
    <text x="14" y="56" class="boxM">feedme.agent.run / .tool.call / .memgc.answer</text>
  </g>
  <g transform="translate(730, 686)">
    <rect width="330" height="72" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="14" y="22" class="boxT">Evaluation</text>
    <text x="14" y="40" class="boxS">Promptfoo · Azure GPT-5.5 rubric grader</text>
    <text x="14" y="56" class="boxM">30 tests · 4 suites · 80% baseline</text>
  </g>

  <!-- Bottom notes -->
  <g transform="translate(40, 786)">
    <rect width="1020" height="60" rx="6" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="510" y="22" text-anchor="middle" class="boxT" font-size="13">No central orchestrator · agents coordinate through the event bus</text>
    <text x="510" y="40" text-anchor="middle" class="boxS">Customer-facing returns to the user FAST · async agents handle side-effects · auto-86 propagates back to pos.db</text>
    <text x="510" y="56" text-anchor="middle" class="annot">Each agent is ~80–140 lines of TS. The shared multi-turn loop lives in src/agents/agent-base.ts.</text>
  </g>

  <g transform="translate(40, 866)">
    <rect width="1020" height="80" rx="6" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="14" y="22" class="boxT" font-size="13">Stack at a glance</text>
    <text x="14" y="42" class="boxM">TS · Bun · Hono · Azure GPT-5.5 · 4 HTTP MCP servers · SQLite WAL · Kafka KRaft (in-proc fallback) · Python memgc-service sidecar (FastAPI) · Redis · Langfuse OTLP · Promptfoo</text>
    <text x="14" y="64" class="boxS">Frontend: snow-dessert React kiosk (CDN Babel · no build step) · agent code reused from ai-contact-bun &amp; ai-agents</text>
  </g>
</svg>
