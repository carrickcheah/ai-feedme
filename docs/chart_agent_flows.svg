<svg width="100%" viewBox="0 0 880 2080" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <marker id="ar3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9c9a92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="ar3-o" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#F08531" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title    { font-size: 18px; font-weight: 700; fill: #fff; }
      .subtitle { font-size: 12px; fill: #b4b2a9; }
      .agentT   { font-size: 16px; font-weight: 700; fill: #fff; letter-spacing: 0.4px; }
      .agentS   { font-size: 11px; fill: rgba(255,255,255,0.75); }
      .boxT     { font-size: 14px; font-weight: 600; fill: #fff; }
      .boxS     { font-size: 11px; fill: rgba(255,255,255,0.75); }
      .boxM     { font-size: 11px; fill: rgba(255,255,255,0.85); font-family: ui-monospace, SFMono-Regular, monospace; }
      .badge    { font-size: 10px; font-weight: 700; fill: #fff; letter-spacing: 0.04em; }
      .annot    { font-size: 11px; fill: #c2c0b6; }
      .annotM   { font-size: 11px; fill: #c2c0b6; font-family: ui-monospace, SFMono-Regular, monospace; }
      .legendT  { font-size: 10px; font-weight: 700; fill: #c2c0b6; letter-spacing: 0.08em; }
      .legendL  { font-size: 11px; fill: #b4b2a9; }
    </style>
  </defs>

  <!-- ── Title ─────────────────────────────────────────────────── -->
  <text x="440" y="34" text-anchor="middle" class="title">Per-agent flow · 3 agents, 1 shared runAgent() loop</text>
  <text x="440" y="54" text-anchor="middle" class="subtitle">Customer-facing is HTTP-driven · Kitchen + Inventory are event-handlers · all use the same multi-turn tool loop</text>

  <!-- ── Legend ─────────────────────────────────────────────────── -->
  <g transform="translate(620, 70)">
    <rect x="0" y="0" width="240" height="64" rx="6" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="12" y="18" class="legendT">LEGEND</text>
    <rect x="12" y="26" width="12" height="12" rx="3" fill="#4738a0" stroke="#afa9ec"/>
    <text x="30" y="36" class="legendL">Agent / LLM call</text>
    <rect x="148" y="26" width="12" height="12" rx="3" fill="#1e4633" stroke="#86c9aa"/>
    <text x="166" y="36" class="legendL">Pure code / DB</text>
    <rect x="12" y="44" width="12" height="12" rx="3" fill="#5c4513" stroke="#e6a44e"/>
    <text x="30" y="54" class="legendL">Event / I/O</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- 1 · CUSTOMER-FACING AGENT                                    -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <g transform="translate(40, 160)">
    <!-- Section header -->
    <rect width="800" height="44" rx="8" fill="#FF7518"/>
    <text x="16" y="28" class="agentT">1 · Customer-facing Agent</text>
    <text x="780" y="28" text-anchor="end" class="agentS">synchronous · HTTP-triggered · src/agents/customer-facing.ts</text>
  </g>

  <!-- Trigger: HTTP request -->
  <g transform="translate(280, 220)">
    <rect width="320" height="48" rx="24" fill="#5c4513" stroke="#e6a44e"/>
    <text x="160" y="22" text-anchor="middle" class="boxT">POST /api/chat/sync</text>
    <text x="160" y="38" text-anchor="middle" class="boxS">{ message, customer_id?, channel }</text>
  </g>
  <line x1="440" y1="268" x2="440" y2="296" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar3)"/>

  <!-- MemGC fetch (conditional) -->
  <g transform="translate(220, 298)">
    <rect width="440" height="62" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="20" class="boxT">memgcAnswer(question)  <tspan font-size="10" fill="#86c9aa">if customer_id</tspan></text>
    <text x="14" y="38" class="boxS">PRISM retrieval via memgc-service · Redis-cached 300s</text>
    <text x="14" y="54" class="boxM">→ inject &lt;memory&gt; profile block into system prompt</text>
  </g>
  <line x1="440" y1="360" x2="440" y2="388" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar3)"/>

  <!-- runAgent (the loop) -->
  <g transform="translate(80, 390)">
    <rect width="720" height="190" rx="8" fill="#4738a0" stroke="#afa9ec"/>
    <text x="20" y="24" class="boxT">runAgent (shared loop)</text>
    <rect x="600" y="14" width="100" height="22" rx="11" fill="#2d2275"/>
    <text x="650" y="29" text-anchor="middle" class="badge">allowed: pos, payment</text>
    <text x="20" y="48" class="boxS">↻ multi-turn LLM call → tool dispatch → repeat until no more tool calls</text>

    <!-- Tool sequence -->
    <g transform="translate(20, 62)">
      <rect width="220" height="32" rx="4" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.4"/>
      <text x="14" y="20" class="boxM">pos__search_menu(query)</text>
    </g>
    <g transform="translate(250, 62)">
      <rect width="220" height="32" rx="4" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.4"/>
      <text x="14" y="20" class="boxM">pos__create_order(items)</text>
    </g>
    <g transform="translate(480, 62)">
      <rect width="220" height="32" rx="4" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.4"/>
      <text x="14" y="20" class="boxM">payment__process_payment</text>
    </g>

    <text x="20" y="118" class="annot">Guarded by allowedMcpServers — supplier / kitchen-display tools are NOT in the schema, can't be called.</text>

    <!-- Response -->
    <line x1="360" y1="122" x2="360" y2="138" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#ar3)"/>
    <g transform="translate(220, 140)">
      <rect width="280" height="38" rx="4" fill="#1e4633" stroke="#86c9aa" stroke-opacity="0.5"/>
      <text x="140" y="16" text-anchor="middle" class="boxS">final assistant message → returns to user</text>
      <text x="140" y="32" text-anchor="middle" class="boxM">{ output, session_id, tools_called, cost_usd }</text>
    </g>
  </g>

  <!-- Side effect: order.created -->
  <line x1="440" y1="580" x2="440" y2="610" stroke="#F08531" stroke-width="1.8" stroke-dasharray="3,3" marker-end="url(#ar3-o)"/>
  <text x="450" y="600" class="annot" fill="#F08531">if pos__create_order succeeded:</text>
  <g transform="translate(280, 612)">
    <rect width="320" height="46" rx="23" fill="#5c4513" stroke="#e6a44e"/>
    <text x="160" y="20" text-anchor="middle" class="boxT" font-size="13">publish order.created</text>
    <text x="160" y="36" text-anchor="middle" class="boxM">→ wakes Kitchen Agent (next section)</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- 2 · KITCHEN AGENT                                            -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <g transform="translate(40, 720)">
    <rect width="800" height="44" rx="8" fill="#FF7518"/>
    <text x="16" y="28" class="agentT">2 · Kitchen Agent</text>
    <text x="780" y="28" text-anchor="end" class="agentS">event-handler · src/agents/kitchen.ts</text>
  </g>

  <!-- Trigger: order.created event -->
  <g transform="translate(280, 780)">
    <rect width="320" height="48" rx="24" fill="#5c4513" stroke="#e6a44e"/>
    <text x="160" y="22" text-anchor="middle" class="boxT">order.created</text>
    <text x="160" y="38" text-anchor="middle" class="boxS">Kafka or in-process fallback</text>
  </g>
  <line x1="440" y1="828" x2="440" y2="856" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar3)"/>

  <!-- Synthetic prompt -->
  <g transform="translate(120, 858)">
    <rect width="640" height="58" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="20" class="boxT">handleOrderCreated(event) — synthetic prompt builder</text>
    <text x="14" y="38" class="boxS">render event payload into natural-language user message + a structured tool-args line</text>
    <text x="14" y="52" class="boxM">"Order ORD-X just came in via web · Items: 1× mango_iceyoo …"</text>
  </g>
  <line x1="440" y1="916" x2="440" y2="944" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar3)"/>

  <!-- runAgent (kitchen) -->
  <g transform="translate(80, 946)">
    <rect width="720" height="156" rx="8" fill="#4738a0" stroke="#afa9ec"/>
    <text x="20" y="24" class="boxT">runAgent (same shared loop)</text>
    <rect x="540" y="14" width="160" height="22" rx="11" fill="#2d2275"/>
    <text x="620" y="29" text-anchor="middle" class="badge">allowed: pos, kitchen-display, supplier</text>
    <text x="20" y="48" class="boxS">max turns: 5 · max tokens: 1024</text>

    <g transform="translate(20, 62)">
      <rect width="340" height="32" rx="4" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.4"/>
      <text x="14" y="20" class="boxM">kitchen-display__send_ticket(order, items)</text>
    </g>
    <g transform="translate(370, 62)">
      <rect width="330" height="32" rx="4" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.4"/>
      <text x="14" y="20" class="boxM">supplier__record_ingredient_consumption</text>
    </g>
    <text x="20" y="118" class="annot">Agent does the tool dispatch. Handler does the downstream event fan-out (next box).</text>
  </g>
  <line x1="440" y1="1102" x2="440" y2="1130" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar3)"/>

  <!-- Post-agent: query supplier.db + dedupe + publish -->
  <g transform="translate(80, 1132)">
    <rect width="720" height="84" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="20" class="boxT">After runAgent: query supplier.db, dedupe by ingredient_id, publish events</text>
    <text x="14" y="40" class="boxM">SELECT ingredient_id, qty, stock_qty FROM ingredient_consumption WHERE order_id = ?</text>
    <text x="14" y="58" class="boxS">for each unique ingredient → publishIngredientConsumed({...})</text>
    <text x="14" y="74" class="boxS">Determinism for downstream events · the LLM's text isn't a contract; SQL is.</text>
  </g>

  <!-- Fan-out arrow -->
  <line x1="440" y1="1216" x2="440" y2="1246" stroke="#F08531" stroke-width="1.8" stroke-dasharray="3,3" marker-end="url(#ar3-o)"/>
  <g transform="translate(280, 1248)">
    <rect width="320" height="46" rx="23" fill="#5c4513" stroke="#e6a44e"/>
    <text x="160" y="20" text-anchor="middle" class="boxT" font-size="13">publish ingredient.consumed × N</text>
    <text x="160" y="36" text-anchor="middle" class="boxM">→ wakes Inventory Agent (one event per unique ingredient)</text>
  </g>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- 3 · INVENTORY AGENT                                          -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <g transform="translate(40, 1360)">
    <rect width="800" height="44" rx="8" fill="#FF7518"/>
    <text x="16" y="28" class="agentT">3 · Inventory Agent</text>
    <text x="780" y="28" text-anchor="end" class="agentS">event-handler · src/agents/inventory.ts</text>
  </g>

  <!-- Trigger: ingredient.consumed -->
  <g transform="translate(280, 1420)">
    <rect width="320" height="48" rx="24" fill="#5c4513" stroke="#e6a44e"/>
    <text x="160" y="22" text-anchor="middle" class="boxT">ingredient.consumed</text>
    <text x="160" y="38" text-anchor="middle" class="boxS">{ ingredient_id, qty, remaining_stock }</text>
  </g>
  <line x1="440" y1="1468" x2="440" y2="1496" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar3)"/>

  <!-- Synthetic prompt -->
  <g transform="translate(120, 1498)">
    <rect width="640" height="46" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="20" class="boxT">handleIngredientConsumed(event) — synthetic prompt builder</text>
    <text x="14" y="38" class="boxM">"Ingredient ing_mango_syrup just dropped to 0.5kg. Check par + reorder if low."</text>
  </g>
  <line x1="440" y1="1544" x2="440" y2="1572" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar3)"/>

  <!-- runAgent (inventory) -->
  <g transform="translate(80, 1574)">
    <rect width="720" height="172" rx="8" fill="#4738a0" stroke="#afa9ec"/>
    <text x="20" y="24" class="boxT">runAgent (same shared loop)</text>
    <rect x="580" y="14" width="120" height="22" rx="11" fill="#2d2275"/>
    <text x="640" y="29" text-anchor="middle" class="badge">allowed: supplier only</text>
    <text x="20" y="48" class="boxS">max turns: 3 · max tokens: 512 (lightweight)</text>

    <g transform="translate(20, 62)">
      <rect width="220" height="32" rx="4" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.4"/>
      <text x="14" y="20" class="boxM">supplier__get_ingredient_stock</text>
    </g>
    <g transform="translate(250, 62)">
      <rect width="220" height="32" rx="4" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.4"/>
      <text x="14" y="20" class="boxM">supplier__list_suppliers</text>
    </g>
    <g transform="translate(480, 62)">
      <rect width="220" height="32" rx="4" fill="#2d2275" stroke="#afa9ec" stroke-opacity="0.4"/>
      <text x="14" y="20" class="boxM">supplier__place_order</text>
    </g>
    <text x="20" y="118" class="annot">Smallest agent — single MCP, fewest turns. Pure stock-vs-par decision.</text>
    <text x="20" y="136" class="annotM">Tightest allowlist = strongest security boundary for the auto-reorder path.</text>
  </g>
  <line x1="440" y1="1746" x2="440" y2="1774" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ar3)"/>

  <!-- Post-agent: snapshot + findAffectedSkus + publish stock.low -->
  <g transform="translate(80, 1776)">
    <rect width="720" height="90" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="20" class="boxT">After runAgent: snapshot supplier.db, decide stock.low</text>
    <text x="14" y="40" class="boxM">SELECT name, stock_qty, par_qty FROM ingredient WHERE id = ?</text>
    <text x="14" y="58" class="boxS">if stock_qty &lt; par_qty:</text>
    <text x="34" y="74" class="boxM">findAffectedSkus(pos.db) → publishStockLow({ ingredient_id, affected_skus[], reorder_triggered })</text>
  </g>
  <line x1="440" y1="1866" x2="440" y2="1894" stroke="#F08531" stroke-width="1.8" stroke-dasharray="3,3" marker-end="url(#ar3-o)"/>

  <!-- 86-propagator -->
  <g transform="translate(80, 1896)">
    <rect width="720" height="72" rx="8" fill="#1e4633" stroke="#86c9aa"/>
    <text x="14" y="20" class="boxT">86-propagator (pure SQL · no LLM)</text>
    <text x="14" y="40" class="boxM">UPDATE menu_item SET is_available = 0 WHERE sku IN (affected_skus)</text>
    <text x="14" y="58" class="boxS">Next pos__search_menu sees the item gone → Customer-facing agent redirects future orders.</text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(40, 1990)">
    <rect width="800" height="70" rx="6" fill="#1a1a1a" stroke="#2a2a2a"/>
    <text x="400" y="22" text-anchor="middle" class="boxT" font-size="13">Same runAgent loop · three different system prompts + MCP allowlists</text>
    <text x="400" y="42" text-anchor="middle" class="boxS">LLM does the intent + tool dispatch. TypeScript handlers do the fan-out + DB snapshots.</text>
    <text x="400" y="58" text-anchor="middle" class="boxS">Determinism for typed contracts; LLM for ambiguous reasoning. Best of both.</text>
  </g>
</svg>
